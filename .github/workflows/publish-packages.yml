name: Publish Renku Packages (Manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (format: vX.Y.Z)'
        required: true
        type: string
      dry_run:
        description: 'When true, run full pipeline but skip npm publish'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  publish-packages:
    name: Build and publish Renku packages
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: '20'
      PNPM_VERSION: '10.15.0'

    steps:
      - name: Validate tag format
        run: |
          if [[ ! "${{ inputs.tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Tag must match vX.Y.Z, got: ${{ inputs.tag }}"
            exit 1
          fi

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Verify tag commit is on main branch
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "❌ Refusing to publish: tag commit is not on main branch"
            exit 1
          fi
          echo "✅ Tag commit is on main branch"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check all packages
        run: pnpm type-check

      - name: Verify tag matches package versions
        run: |
          TAG_VERSION="${{ inputs.tag }}"
          TAG_VERSION="${TAG_VERSION#v}"

          CLI_VERSION=$(node -p "require('./cli/package.json').version")
          CORE_VERSION=$(node -p "require('./core/package.json').version")
          COMPOSITIONS_VERSION=$(node -p "require('./compositions/package.json').version")
          PROVIDERS_VERSION=$(node -p "require('./providers/package.json').version")
          DESKTOP_VERSION=$(node -p "require('./desktop/package.json').version")

          if [ "$CLI_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Tag v$TAG_VERSION does not match cli/package.json ($CLI_VERSION)"
            exit 1
          fi

          if [ "$CORE_VERSION" != "$TAG_VERSION" ] || [ "$COMPOSITIONS_VERSION" != "$TAG_VERSION" ] || [ "$PROVIDERS_VERSION" != "$TAG_VERSION" ] || [ "$DESKTOP_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Package versions are not in sync with tag v$TAG_VERSION"
            echo "core=$CORE_VERSION compositions=$COMPOSITIONS_VERSION providers=$PROVIDERS_VERSION cli=$CLI_VERSION desktop=$DESKTOP_VERSION"
            exit 1
          fi

          echo "✅ Tag and package versions are synchronized"

      - name: Build all publishable packages
        run: |
          pnpm --filter @gorenku/core build
          pnpm --filter @gorenku/compositions build
          pnpm --filter @gorenku/providers build
          pnpm --filter @gorenku/cli build

      - name: Publish renku-core
        if: ${{ inputs.dry_run == false }}
        run: npm publish ./core --provenance --access public

      - name: Publish renku-compositions
        if: ${{ inputs.dry_run == false }}
        run: npm publish ./compositions --provenance --access public

      - name: Publish renku-providers
        if: ${{ inputs.dry_run == false }}
        run: npm publish ./providers --provenance --access public

      - name: Bundle viewer assets into CLI
        run: pnpm bundle:viewer

      - name: Pack CLI (includes bundled viewer)
        run: pnpm --filter @gorenku/cli pack --pack-destination release

      - name: Locate packaged CLI tarball
        id: tarball
        run: |
          TARBALL=$(ls release/gorenku-cli-*.tgz)
          if [ -z "$TARBALL" ]; then
            echo "No packaged tarball found in release/"
            exit 1
          fi
          echo "path=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Verify viewer bundle inside CLI tarball
        run: |
          tar -tf "${{ steps.tarball.outputs.path }}" | grep -q "package/config/viewer/dist/index.html"
          tar -tf "${{ steps.tarball.outputs.path }}" | grep -q "package/config/viewer/server-dist/bin.js"

      - name: Smoke test CLI
        run: node cli/dist/cli.js --help

      - name: Publish renku CLI
        if: ${{ inputs.dry_run == false }}
        run: npm publish "${{ steps.tarball.outputs.path }}" --provenance --access public

      - name: Upload CLI tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: renku-cli-tarball
          path: ${{ steps.tarball.outputs.path }}

      - name: Summary
        if: always()
        run: |
          echo "## Publishing Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Tag: ${{ inputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            echo "✅ Dry run completed - no packages were published" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "📦 Published packages:" >> "$GITHUB_STEP_SUMMARY"
            echo "- @gorenku/core" >> "$GITHUB_STEP_SUMMARY"
            echo "- @gorenku/compositions" >> "$GITHUB_STEP_SUMMARY"
            echo "- @gorenku/providers" >> "$GITHUB_STEP_SUMMARY"
            echo "- @gorenku/cli (with bundled viewer)" >> "$GITHUB_STEP_SUMMARY"
          fi
