# Minimal inputs for producer dry-run test
# Prompt is the only required model field, but simulated video dry-runs need an
# explicit duration so they can generate a valid MP4 with a real clip length.

inputs:
  Prompt: "A sunset over mountains with birds flying"
  Duration: 5

models:
  - model: bytedance/seedance-1-pro-fast
    provider: replicate
    producerId: TextToVideoProducer
