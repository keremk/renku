inputs:
  InquiryPrompt: "Sketch an expedition to Europa's ice oceans"
  Duration: 20
  NumOfClips: 2
  Audience: 'Adult'
  Language: 'en'
  Style: 'Illustrated sci-fi field notes'
  Resolution:
    width: 1280
    height: 720
  VoiceId: 'Wise_Woman'
  Emotion: neutral

models:
  - model: gpt-5-mini
    provider: openai
    producerId: FlowVideoPromptProducer
  - model: google/nano-banana
    provider: replicate
    producerId: ImageProducer
  - model: kling-video/v2.5-turbo/pro/image-to-video
    provider: fal-ai
    producerId: ImageToVideoProducer
  - model: minimax/speech-2.6-hd
    provider: replicate
    producerId: AudioProducer
  - model: timeline/ordered
    provider: renku
    producerId: TimelineComposer
    config:
      timeline:
        tracks: ['Video', 'Audio']
        masterTracks: ['Audio']
        numTracks: 2
        videoClip:
          artifact: VideoClips
        audioClip:
          artifact: AudioClips
          volume: 0.9
