meta:
  name: Content Generator
  description: Generates content script with clips.
  id: ContentGenerator
  kind: producer
  version: 0.1.0
  outputSchema: ./content-generator-output.json

inputs:
  - name: Topic
    description: The topic for content generation.
    type: string
    required: true
  - name: NumOfClips
    description: Number of clips to generate.
    type: int
    required: true

outputs:
  - name: Script
    description: Generated script with clips.
    type: json
    arrays:
      - path: Clips
        countInput: NumOfClips
