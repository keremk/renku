meta:
  name: Multi-Looped Inputs Test
  description: Tests producers receiving looped inputs from multiple sources (sibling fields + artifacts).
  id: MultiLoopedInputs
  version: 0.1.0

inputs:
  - name: Duration
    description: Total video duration in seconds.
    type: int
    required: true
  - name: Topic
    description: The topic for content generation.
    type: string
    required: true
  - name: NumOfClips
    description: Number of clips.
    type: int
    required: true

outputs:
  - name: GeneratedImage
    description: Generated images per clip.
    type: array
    itemType: image
  - name: FinalVideo
    description: Final video per clip.
    type: array
    itemType: video

loops:
  - name: clip
    countInput: NumOfClips

imports:
  - name: ContentGenerator
    path: ../../../producers/content-generator/content-generator.yaml
  - name: ImageGenerator
    path: ../../../producers/image-generator/image-generator.yaml
    loop: clip
  - name: VideoGenerator
    path: ../../../producers/video-generator/video-generator.yaml
    loop: clip

connections:
  # ContentGenerator receives the topic
  - from: Topic
    to: ContentGenerator.Topic
  - from: NumOfClips
    to: ContentGenerator.NumOfClips

  # ImageGenerator receives prompt from ContentGenerator
  - from: ContentGenerator.Script.Clips[clip].ImagePrompt
    to: ImageGenerator[clip].Prompt

  # Write ImageGenerator output to artifact
  - from: ImageGenerator[clip].GeneratedImage
    to: GeneratedImage[clip]

  # VideoGenerator receives MULTIPLE looped inputs from the SAME array clip
  # This tests the sibling field dimension unification
  - from: ContentGenerator.Script.Clips[clip].VideoPrompt
    to: VideoGenerator[clip].Prompt
  - from: ContentGenerator.Script.Clips[clip].VideoDescription
    to: VideoGenerator[clip].Description

  # VideoGenerator also receives input from another producer's output (different dimension source)
  # This tests cross-producer dimension alignment
  - from: ImageGenerator[clip].GeneratedImage
    to: VideoGenerator[clip].ThumbnailImage
  - from: ClipDuration
    to: VideoGenerator[clip].Duration

  # Write VideoGenerator output to artifact
  - from: VideoGenerator[clip].GeneratedVideo
    to: FinalVideo[clip]
