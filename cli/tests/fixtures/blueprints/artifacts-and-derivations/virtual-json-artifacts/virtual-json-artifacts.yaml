meta:
  name: JSON Blueprint Test
  description: Test blueprint using JSON virtual artifacts to generate images.
  id: JsonBlueprint
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: InquiryPrompt
    description: The topic describing the desired documentary.
    type: string
    required: true
  - name: NumOfImagesPerClip
    description: Number of images per clip.
    type: int
    required: true
  - name: Style
    description: Image style description.
    type: string
    required: true
  - name: Resolution
    description: Image resolution as width/height pixel dimensions.
    type: resolution
    required: false

outputs:
  - name: ClipImage
    description: Generated images for each clip.
    type: multiDimArray
    itemType: image
  - name: Timeline
    description: The composed timeline JSON manifest.
    type: json

loops:
  - name: clip
    countInput: NumOfClips
  - name: image
    parent: clip
    countInput: NumOfImagesPerClip

imports:
  - name: DocProducer
    path: ../../_shared/documentary/documentary.yaml
  - name: ImageProducer
    producer: image/text-to-image
    loop: clip.image
  - name: TimelineComposer
    producer: composition/timeline-composer

connections:
  # Wire inputs to DocProducer
  - from: InquiryPrompt
    to: DocProducer.InquiryPrompt
  - from: Duration
    to: DocProducer.Duration
  - from: NumOfClips
    to: DocProducer.NumOfClips
  - from: NumOfImagesPerClip
    to: DocProducer.NumOfImagesPerClip
  - from: Style
    to: DocProducer.Style

  # Wire JSON virtual artifacts to ImageProducer
  - from: DocProducer.VideoScript.Clips[clip].ImagePrompts[image]
    to: ImageProducer[clip][image].Prompt
  - from: Resolution
    to: ImageProducer[clip][image].Resolution

  # Wire ImageProducer outputs to TimelineComposer
  - from: ImageProducer[clip][image].GeneratedImage
    to: TimelineComposer.ImageClips

  # Wire outputs to blueprint artifacts
  - from: ImageProducer[clip][image].GeneratedImage
    to: ClipImage[clip][image]

  - from: Duration
    to: TimelineComposer.Duration
  - from: TimelineComposer.Timeline
    to: Timeline
