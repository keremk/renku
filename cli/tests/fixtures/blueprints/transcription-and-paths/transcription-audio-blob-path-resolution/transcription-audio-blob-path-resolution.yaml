meta:
  name: Transcription Path Resolution Test
  description: Verifies transcription audio loading from canonical blob paths.
  id: TranscriptionPathResolutionTest
  version: 0.1.0

inputs:
  - name: NumOfClips
    description: Number of narration clips.
    type: int
    required: true
  - name: NarrationScript
    description: Narration text per clip.
    type: array
    itemType: string
    required: true
  - name: VoiceId
    description: Voice identifier for TTS.
    type: string
    required: true
  - name: Duration
    description: Total timeline duration in seconds.
    type: int
    required: true
  - name: LanguageCode
    description: ISO-639-3 language code.
    type: string
    required: true

outputs:
  - name: ClipAudio
    description: Narration audio per clip.
    type: array
    itemType: audio
    countInput: NumOfClips
  - name: Timeline
    description: Timeline document.
    type: json
  - name: Transcription
    description: Transcription output.
    type: json

loops:
  - name: clip
    countInput: NumOfClips

imports:
  - name: AudioProducer
    producer: audio/text-to-speech
    loop: clip
  - name: TimelineComposer
    producer: composition/timeline-composer
  - name: TranscriptionProducer
    producer: json/transcription

connections:
  - from: NarrationScript[clip]
    to: AudioProducer[clip].Text
  - from: ClipDuration
    to: AudioProducer[clip].Duration
  - from: VoiceId
    to: AudioProducer[clip].VoiceId
  - from: AudioProducer[clip].GeneratedAudio
    to: ClipAudio[clip]

  - from: AudioProducer[clip].GeneratedAudio
    to: TimelineComposer.AudioClips
  - from: AudioProducer[clip].GeneratedAudio
    to: TimelineComposer.TranscriptionAudio
  - from: Duration
    to: TimelineComposer.Duration
  - from: TimelineComposer.Timeline
    to: Timeline

  - from: TimelineComposer.Timeline
    to: TranscriptionProducer.Timeline
  - from: LanguageCode
    to: TranscriptionProducer.LanguageCode
  - from: TranscriptionProducer.Transcription
    to: Transcription
