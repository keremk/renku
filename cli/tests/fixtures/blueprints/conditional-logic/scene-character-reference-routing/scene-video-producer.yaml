meta:
  name: Fixture Scene Video Producer
  description: Fixture producer for sparse scene-to-character reference routing.
  id: FixtureSceneVideoProducer
  kind: producer
  version: 0.1.0

inputs:
  - name: Prompt
    description: Text description of the video.
    type: string
    storyboard: main
  - name: ReferenceImages
    description: Optional sparse reference images for characters present in a scene.
    type: array
    itemType: image
    required: false
  - name: Duration
    description: Video duration in seconds.
    type: integer
    required: true
  - name: Resolution
    description: Resolution as width/height pixel dimensions.
    type: resolution
    required: false

outputs:
  - name: GeneratedVideo
    description: The generated scene video.
    type: video

mappings:
  fal-ai:
    veo3.1/reference-to-video:
      Prompt: prompt
      ReferenceImages: image_urls
      Duration:
        field: duration
        intToSecondsString: true
      Resolution:
        field: resolution
        resolution:
          mode: preset
