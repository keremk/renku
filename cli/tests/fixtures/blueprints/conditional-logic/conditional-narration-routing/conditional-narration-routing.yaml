meta:
  name: Conditional Narration Routing
  description: Covers conditional branch routing, sparse fan-in timeline composition, and transcription-track fan-in.
  id: ConditionalNarrationRouting
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: Duration
    description: Total documentary duration in seconds.
    type: int
    required: true
  - name: NumOfSegments
    description: Number of documentary segments.
    type: int
    required: true
  - name: InquiryPrompt
    description: The topic describing the desired documentary.
    type: string
    required: true
  - name: NumOfImagesPerSegment
    description: Number of images per segment.
    type: int
    required: true
  - name: Resolution
    description: Video and image resolution as width/height pixel dimensions. Model default varies.
    type: resolution
  - name: Style
    description: Image style.
    type: string
    required: true
  - name: VoiceId
    description: Voice identifier.
    type: string
    required: true

outputs:
  - name: SegmentImage
    description: Generated images (conditional).
    type: multiDimArray
    itemType: image
  - name: SegmentAudio
    description: Generated audio (conditional).
    type: array
    itemType: audio
  - name: SegmentVideo
    description: Generated video (conditional).
    type: array
    itemType: video
  - name: Timeline
    description: Generated timeline JSON.
    type: json

loops:
  - name: segment
    countInput: NumOfSegments
  - name: image
    parent: segment
    countInput: NumOfImagesPerSegment

# Named condition definitions (referenced by 'if:' on edges)
conditions:
  isImageNarration:
    when: DocProducer.VideoScript.Segments[segment].NarrationType
    is: 'ImageNarration'
  isAudioNeeded:
    any:
      - when: DocProducer.VideoScript.Segments[segment].NarrationType
        is: 'TalkingHead'
      - when: DocProducer.VideoScript.Segments[segment].UseNarrationAudio
        is: true
  isTalkingHead:
    when: DocProducer.VideoScript.Segments[segment].NarrationType
    is: 'TalkingHead'

imports:
  - name: DocProducer
    path: ../../_shared/documentary/documentary.yaml
  - name: ImageProducer
    producer: image/text-to-image
    loop: segment.image
    if: isImageNarration
  - name: AudioProducer
    producer: audio/text-to-speech
    loop: segment
    if: isAudioNeeded
  - name: VideoProducer
    producer: video/text-to-video
    loop: segment
    if: isTalkingHead
  - name: TimelineComposer
    producer: composition/timeline-composer

connections:
  # Wire inputs to DocProducer
  - from: InquiryPrompt
    to: DocProducer.InquiryPrompt
  - from: NumOfSegments
    to: DocProducer.NumOfSegments
  - from: NumOfImagesPerSegment
    to: DocProducer.NumOfImagesPerSegment
  - from: Duration
    to: DocProducer.Duration
  - from: Style
    to: DocProducer.Style

  # Conditional: ImageProducer only when NarrationType is ImageNarration
  - from: DocProducer.VideoScript.Segments[segment].ImagePrompts[image]
    to: ImageProducer[segment][image].Prompt
  - from: Resolution
    to: ImageProducer[segment][image].Resolution
  - from: ImageProducer[segment][image].GeneratedImage
    to: SegmentImage[segment][image]
    if: isImageNarration

  # Conditional: AudioProducer only when NarrationType is TalkingHead
  - from: DocProducer.VideoScript.Segments[segment].Script
    to: AudioProducer[segment].Text
  - from: SegmentDuration
    to: AudioProducer[segment].Duration
  - from: VoiceId
    to: AudioProducer[segment].VoiceId
  - from: AudioProducer[segment].GeneratedAudio
    to: SegmentAudio[segment]
    if: isAudioNeeded

  # Conditional: VideoProducer only when NarrationType is TalkingHead
  - from: DocProducer.VideoScript.Segments[segment].VideoPrompt
    to: VideoProducer[segment].Prompt
  - from: SegmentDuration
    to: VideoProducer[segment].Duration
  - from: Resolution
    to: VideoProducer[segment].Resolution
  - from: VideoProducer[segment].GeneratedVideo
    to: SegmentVideo[segment]
    if: isTalkingHead

  - from: AudioProducer[segment].GeneratedAudio
    to: TimelineComposer.AudioSegments
    if: isAudioNeeded
  - from: VideoProducer[segment].GeneratedVideo
    to: TimelineComposer.VideoSegments
    if: isTalkingHead
  - from: ImageProducer[segment][image].GeneratedImage
    to: TimelineComposer.ImageSegments
    if: isImageNarration
  - from: AudioProducer[segment].GeneratedAudio
    to: TimelineComposer.TranscriptionAudio
    if: isAudioNeeded
  - from: Duration
    to: TimelineComposer.Duration
  - from: TimelineComposer.Timeline
    to: Timeline
