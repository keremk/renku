meta:
  name: Images with Audio Narration
  description: A blueprint for generating narrated image clips and composing them into a timeline.
  id: ImageAudio
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: Duration
    description: Total timeline duration in seconds.
    type: int
    required: true
  - name: NumOfClips
    description: Number of narration clips.
    type: int
    required: true
  - name: InquiryPrompt
    description: The prompt describing the movie script to be generated.
    type: string
    required: true
  - name: NumOfImagesPerNarrative
    description: Number of images to generate per narrative text.
    type: int
    required: false
  - name: Style
    description: Text describing the image style to be used.
    type: string
    required: true
  - name: Resolution
    description: Image resolution as width/height pixel dimensions.
    type: resolution
    required: false
  - name: Audience
    description: The target audience for the movie (e.g., children, adults, experts).
    type: string
    required: false
  - name: VoiceId
    description: The voice identifier to feed into audio generation.
    type: string
    required: true
  - name: Emotion
    description: Optional emotion hint for narration.
    type: string
    required: false
  - name: Language
    description: Narration language (e.g., en, es, fr).
    type: string
    required: false

outputs:
  - name: ClipImage
    description: The narrated image clips for the movie.
    type: multiDimArray
    itemType: image
  - name: ClipAudio
    description: The narrated audio clips for the movie.
    type: array
    itemType: audio
  - name: Timeline
    description: The composed timeline JSON manifest.
    type: json

loops:
  - name: clip
    description: Iterates over narration clips.
    countInput: NumOfClips
  - name: image
    description: Iterates over images generated per clip.
    parent: clip
    countInput: NumOfImagesPerNarrative

imports:
  - name: ScriptProducer
    path: ../../_shared/script/script.yaml
  - name: ImagePromptProducer
    path: ../../_shared/image/image.yaml
    loop: clip
  - name: ImageProducer
    producer: image/text-to-image
    loop: clip.image
  - name: AudioProducer
    producer: audio/text-to-speech
    loop: clip
  - name: TimelineComposer
    producer: composition/timeline-composer

connections:
  - from: InquiryPrompt
    to: ScriptProducer.InquiryPrompt
  - from: Audience
    to: ScriptProducer.Audience
  - from: Duration
    to: ScriptProducer.Duration
  - from: NumOfClips
    to: ScriptProducer.NumOfClips
  - from: Language
    to: ScriptProducer.Language

  - from: ScriptProducer.NarrationScript[clip]
    to: ImagePromptProducer[clip].NarrativeText
  - from: ScriptProducer.MovieSummary
    to: ImagePromptProducer[clip].OverallSummary
  - from: Style
    to: ImagePromptProducer[clip].Style
  - from: Audience
    to: ImagePromptProducer[clip].Audience
  - from: NumOfImagesPerNarrative
    to: ImagePromptProducer[clip].NumOfImagesPerNarrative

  - from: ImagePromptProducer.ImagePrompt[clip][image]
    to: ImageProducer[clip][image].Prompt
  - from: Resolution
    to: ImageProducer[clip][image].Resolution
  - from: ImageProducer[clip][image].GeneratedImage
    to: ClipImage[clip][image]
  - from: ImageProducer[clip][image].GeneratedImage
    to: TimelineComposer.ImageClips

  - from: ScriptProducer.NarrationScript[clip]
    to: AudioProducer[clip].Text
  - from: ClipDuration
    to: AudioProducer[clip].Duration
  - from: VoiceId
    to: AudioProducer[clip].VoiceId
  - from: Emotion
    to: AudioProducer[clip].Emotion
  - from: AudioProducer[clip].GeneratedAudio
    to: ClipAudio[clip]
  - from: AudioProducer[clip].GeneratedAudio
    to: TimelineComposer.AudioClips

  - from: Duration
    to: TimelineComposer.Duration
  - from: TimelineComposer.Timeline
    to: Timeline
