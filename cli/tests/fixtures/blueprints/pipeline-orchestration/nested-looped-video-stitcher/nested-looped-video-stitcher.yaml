meta:
  name: Nested Looped Video Stitcher
  description: Regression fixture for a looped parent blueprint whose child blueprint stitches two generated clips.
  id: NestedLoopedVideoStitcher
  version: 0.1.0

inputs:
  - name: NumOfClips
    type: int
    required: true
  - name: FirstClipPrompts
    type: array
    itemType: string
    countInput: NumOfClips
    required: true
  - name: SecondClipPrompts
    type: array
    itemType: string
    countInput: NumOfClips
    required: true
  - name: Duration
    type: int
    required: true
  - name: Resolution
    type: resolution
    required: true

outputs:
  - name: ClipVideos
    type: array
    itemType: video
    countInput: NumOfClips

loops:
  - name: clip
    countInput: NumOfClips

imports:
  - name: ClipVideoProducer
    path: ./segment-video/segment-video.yaml
    loop: clip

connections:
  - from: FirstClipPrompts[clip]
    to: ClipVideoProducer[clip].FirstClipPrompt
  - from: SecondClipPrompts[clip]
    to: ClipVideoProducer[clip].SecondClipPrompt
  - from: ClipDuration
    to: ClipVideoProducer[clip].UnitDuration
  - from: Duration
    to: ClipVideoProducer[clip].Duration
  - from: Resolution
    to: ClipVideoProducer[clip].Resolution

  - from: ClipVideoProducer[clip].ClipVideo
    to: ClipVideos[clip]
