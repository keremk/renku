meta:
  name: Clip Video
  description: Builds one clip by generating two clips and stitching them into a single video.
  id: ClipVideo
  version: 0.1.0

inputs:
  - name: FirstClipPrompt
    type: text
    required: true
  - name: SecondClipPrompt
    type: text
    required: true
  - name: UnitDuration
    type: int
    required: true
  - name: Duration
    type: int
    required: true
  - name: Resolution
    type: resolution
    required: true

outputs:
  - name: ClipVideo
    type: video

imports:
  - name: FirstClipProducer
    producer: video/text-to-video
  - name: SecondClipProducer
    producer: video/text-to-video
  - name: VideoStitcher
    producer: composition/video-stitcher

connections:
  - from: FirstClipPrompt
    to: FirstClipProducer.Prompt
  - from: UnitDuration
    to: FirstClipProducer.Duration
  - from: Resolution
    to: FirstClipProducer.Resolution

  - from: SecondClipPrompt
    to: SecondClipProducer.Prompt
  - from: UnitDuration
    to: SecondClipProducer.Duration
  - from: Resolution
    to: SecondClipProducer.Resolution

  - from: FirstClipProducer.GeneratedVideo
    to: VideoStitcher.VideoClips
    groupBy: singleton
  - from: SecondClipProducer.GeneratedVideo
    to: VideoStitcher.VideoClips
    groupBy: singleton
  - from: Duration
    to: VideoStitcher.Duration

  - from: VideoStitcher.StitchedVideo
    to: ClipVideo
