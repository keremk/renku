meta:
  name: Audio Only Narration
  description: Generate narrated audio clips from a textual inquiry.
  id: audio
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: Duration
    description: Total narration duration in seconds.
    type: int
    required: true
  - name: NumOfClips
    description: Number of narration clips.
    type: int
    required: true
  - name: InquiryPrompt
    description: The prompt describing the movie script to be generated.
    type: string
    required: true
  - name: VoiceId
    description: Voice preset identifier.
    type: string
    required: true
  - name: Audience
    description: Target audience for tone and vocabulary.
    type: string
    required: false
  - name: Emotion
    description: Optional emotion hint for narration.
    type: string
    required: false
  - name: Language
    description: Narration language.
    type: string
    required: false

outputs:
  - name: ClipAudio
    description: Generated audio for each narration clip.
    type: array
    itemType: audio
    countInput: NumOfClips

loops:
  - name: clip
    description: Iterates over narration clips.
    countInput: NumOfClips

imports:
  - name: ScriptProducer
    path: ../../_shared/script/script.yaml
  - name: AudioProducer
    producer: audio/text-to-speech
    loop: clip

connections:
  - from: InquiryPrompt
    to: ScriptProducer.InquiryPrompt
  - from: Audience
    to: ScriptProducer.Audience
  - from: Duration
    to: ScriptProducer.Duration
  - from: Language
    to: ScriptProducer.Language
  - from: NumOfClips
    to: ScriptProducer.NumOfClips

  - from: ScriptProducer.NarrationScript[clip]
    to: AudioProducer[clip].Text
  - from: ClipDuration
    to: AudioProducer[clip].Duration
  - from: VoiceId
    to: AudioProducer[clip].VoiceId
  - from: Emotion
    to: AudioProducer[clip].Emotion

  - from: AudioProducer[clip].GeneratedAudio
    to: ClipAudio[clip]
