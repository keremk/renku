meta:
  id: CompositeLocalVideo
  name: Composite Local Video

inputs:
  - name: Duration
    type: number
    required: true
  - name: NumOfClips
    type: int
    required: true
  - name: Prompts
    type: array
    itemType: string
    required: true
    countInput: NumOfClips
  - name: SourceImages
    type: array
    itemType: image
    required: true
    countInput: NumOfClips

outputs:
  - name: ClipVideos
    type: array
    itemType: video
    countInput: NumOfClips

loops:
  - name: clip
    countInput: NumOfClips

imports:
  - name: ClipUnit
    path: ./segment-unit/segment-unit.yaml
    loop: clip

connections:
  - from: Duration
    to: ClipUnit[clip].Duration
  - from: Prompts[clip]
    to: ClipUnit[clip].Prompt
  - from: SourceImages[clip]
    to: ClipUnit[clip].SourceImage
  - from: ClipUnit[clip].FinalVideo
    to: ClipVideos[clip]
