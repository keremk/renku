meta:
  name: Video, Narration, Music, and Subtitles Timeline
  description: Generate narrated video clips with a looping music bed and compose them into a timeline with the new subtitles composite.
  id: VideoAudioMusicSubtitlesV2
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: Duration
    description: Total timeline duration in seconds.
    type: int
    required: true
  - name: NumOfClips
    description: Number of narration/video clips.
    type: int
    required: true
  - name: InquiryPrompt
    description: The prompt describing the movie script to be generated.
    type: string
    required: true
  - name: Audience
    description: Target audience for tone and vocabulary.
    type: string
    required: false
  - name: Language
    description: Narration language for the script.
    type: string
    required: false
  - name: Style
    description: Style hint fed into the video prompt generator.
    type: string
    required: true
  - name: Resolution
    description: Target resolution as width/height pixel dimensions for generated videos.
    type: resolution
    required: true
  - name: VoiceId
    description: Voice identifier used for narration.
    type: string
    required: true
  - name: Emotion
    description: Optional emotion hint for narration synthesis.
    type: string
    required: false
  - name: MusicalStyle
    description: Style guidance for the background music.
    type: string
    required: false

outputs:
  - name: ClipVideo
    description: Generated video clips for each narration chunk.
    type: array
    itemType: video
    countInput: NumOfClips
  - name: ClipAudio
    description: Generated narration audio per clip.
    type: array
    itemType: audio
    countInput: NumOfClips
  - name: Music
    description: Background music tracks for the movie.
    type: audio
  - name: Timeline
    description: OrderedTimeline JSON manifest for Remotion playback.
    type: json
  - name: FinalVideo
    description: Final rendered MP4 export.
    type: video

loops:
  - name: clip
    description: Iterates over narration clips.
    countInput: NumOfClips

imports:
  - name: ScriptProducer
    path: ../../_shared/script/script.yaml
  - name: VideoPromptProducer
    path: ./video-producer/video-producer.yaml
    loop: clip
  - name: VideoProducer
    producer: video/text-to-video
    loop: clip
  - name: AudioProducer
    producer: audio/text-to-speech
    loop: clip
  - name: MusicPromptProducer
    path: ./music-producer/music-producer.yaml
  - name: MusicProducer
    producer: audio/text-to-music
  - name: TimelineComposer
    producer: composition/timeline-composer
  - name: SubtitlesProducer
    producer: composition/subtitles
  - name: VideoExporter
    producer: composition/video-exporter

connections:
  - from: InquiryPrompt
    to: ScriptProducer.InquiryPrompt
  - from: Audience
    to: ScriptProducer.Audience
  - from: Duration
    to: ScriptProducer.Duration
  - from: Language
    to: ScriptProducer.Language
  - from: NumOfClips
    to: ScriptProducer.NumOfClips

  - from: ScriptProducer.NarrationScript[clip]
    to: VideoPromptProducer[clip].NarrativeText
  - from: ScriptProducer.MovieSummary
    to: VideoPromptProducer[clip].MovieSummary
  - from: Style
    to: VideoPromptProducer[clip].Style
  - from: ClipDuration
    to: VideoPromptProducer[clip].ClipDuration
  - from: Audience
    to: VideoPromptProducer[clip].Audience

  - from: VideoPromptProducer.VideoPrompt[clip]
    to: VideoProducer[clip].Prompt
  - from: Resolution
    to: VideoProducer[clip].Resolution
  - from: ClipDuration
    to: VideoProducer[clip].Duration
  - from: VideoProducer[clip].GeneratedVideo
    to: ClipVideo[clip]
  - from: VideoProducer[clip].GeneratedVideo
    to: TimelineComposer.VideoClips

  - from: ScriptProducer.NarrationScript[clip]
    to: AudioProducer[clip].Text
  - from: ClipDuration
    to: AudioProducer[clip].Duration
  - from: VoiceId
    to: AudioProducer[clip].VoiceId
  - from: Emotion
    to: AudioProducer[clip].Emotion
  - from: AudioProducer[clip].GeneratedAudio
    to: ClipAudio[clip]
  - from: AudioProducer[clip].GeneratedAudio
    to: TimelineComposer.AudioClips

  - from: ScriptProducer.MovieSummary
    to: MusicPromptProducer.MovieSummary
  - from: MusicalStyle
    to: MusicPromptProducer.MusicalStyle
  - from: NumOfClips
    to: MusicPromptProducer.NumOfClips
  - from: Duration
    to: MusicPromptProducer.Duration
  - from: Audience
    to: MusicPromptProducer.Audience
  - from: ScriptProducer.NarrationScript
    to: MusicPromptProducer.NarrationScript

  - from: MusicPromptProducer.MusicPrompt
    to: MusicProducer.Prompt
  - from: Duration
    to: MusicProducer.Duration
  - from: MusicProducer.GeneratedMusic
    to: Music

  - from: Duration
    to: TimelineComposer.Duration
  - from: MusicProducer.GeneratedMusic
    to: TimelineComposer.Music
  - from: TimelineComposer.Timeline
    to: Timeline

  - from: AudioProducer[clip].GeneratedAudio
    to: TimelineComposer.TranscriptionAudio

  - from: AudioProducer[clip].GeneratedAudio
    to: SubtitlesProducer.TranscriptionAudio[clip]
  - from: Duration
    to: SubtitlesProducer.Duration
  - from: NumOfClips
    to: SubtitlesProducer.NumOfClips
  - from: Language
    to: SubtitlesProducer.LanguageCode
  - from: TimelineComposer.Timeline
    to: SubtitlesProducer.Timeline

  - from: TimelineComposer.Timeline
    to: VideoExporter.Timeline
  - from: Duration
    to: VideoExporter.Duration
  - from: SubtitlesProducer.Transcription
    to: VideoExporter.Transcription
  - from: VideoExporter.FinalVideo
    to: FinalVideo
