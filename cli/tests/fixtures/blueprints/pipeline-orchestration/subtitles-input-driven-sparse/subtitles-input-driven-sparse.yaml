meta:
  name: Subtitles Input Driven Sparse
  description: Minimal fixture for verifying sparse transcription audio planning in the subtitles composite.
  id: SubtitlesInputDrivenSparse
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: NumOfClips
    type: int
    required: true
  - name: Duration
    type: int
    required: true
  - name: Language
    type: string
    required: true
  - name: Timeline
    type: json
    required: true
  - name: TranscriptionAudio
    type: array
    itemType: audio
    countInput: NumOfClips
    required: true

outputs:
  - name: Transcription
    type: json

loops:
  - name: clip
    countInput: NumOfClips

imports:
  - name: SubtitlesProducer
    producer: composition/subtitles

connections:
  - from: NumOfClips
    to: SubtitlesProducer.NumOfClips
  - from: Duration
    to: SubtitlesProducer.Duration
  - from: Language
    to: SubtitlesProducer.LanguageCode
  - from: Timeline
    to: SubtitlesProducer.Timeline
  - from: TranscriptionAudio[clip]
    to: SubtitlesProducer.TranscriptionAudio[clip]
  - from: SubtitlesProducer.Transcription
    to: Transcription
