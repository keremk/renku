inputs:
  NumOfSegments: 3
  Duration: 30
  Language: 'en'
  Timeline:
    id: sparse-subtitles-timeline
    duration: 30
    tracks:
      - id: transcription
        kind: Transcription
        clips:
          - id: transcription-0
            kind: Transcription
            startTime: 0
            duration: 10
            properties:
              assetId: audio-segment-0
              groupIndex: 0
          - id: transcription-2
            kind: Transcription
            startTime: 20
            duration: 10
            properties:
              assetId: audio-segment-2
              groupIndex: 2
  TranscriptionAudio:
    - 'https://example.com/audio-segment-0.mp3'
    - null
    - 'https://example.com/audio-segment-2.mp3'

models:
  - model: elevenlabs/speech-to-text
    provider: fal-ai
    producerId: SubtitlesProducer.STTTimestamps
  - model: speech/stt-normalizer
    provider: renku
    producerId: SubtitlesProducer.STTNormalizer
    config: {}
  - model: speech/subtitles-composer
    provider: renku
    producerId: SubtitlesProducer.SubtitlesComposer
    config: {}
