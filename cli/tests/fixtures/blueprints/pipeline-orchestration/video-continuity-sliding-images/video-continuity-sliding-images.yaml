meta:
  name: Flow Video Generation
  description: Generate video from clips with first and last frame continuity.
  id: FlowVideo
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: Duration
    description: Total movie duration in seconds.
    type: int
    required: true
  - name: NumOfClips
    description: Number of narration/video clips.
    type: int
    required: true
  - name: InquiryPrompt
    description: The prompt describing the movie script to be generated.
    type: string
    required: true
  - name: Audience
    description: Target audience for tone and vocabulary.
    type: string
    required: false
  - name: Language
    description: Narration language.
    type: string
    required: false
  - name: Style
    description: Desired movie style to feed into prompt.
    type: string
    required: true
  - name: Resolution
    description: Video and image resolution as width/height pixel dimensions.
    type: resolution
    required: true
  - name: VoiceId
    description: The voice identifier to feed into audio generation.
    type: string
    required: true
  - name: Emotion
    description: Optional emotion hint for narration.
    type: string
    required: false

outputs:
  - name: ClipVideo
    description: Generated video for each narration clip.
    type: array
    itemType: video
    countInput: NumOfClips
  - name: ClipAudio
    description: The narrated audio clips for the movie.
    type: array
    itemType: audio
  - name: Timeline
    description: The composed timeline JSON manifest.
    type: json

loops:
  - name: clip
    description: Iterates over narration clips.
    countInput: NumOfClips
  - name: image
    description: Iterates over images for each clip, one more than the number of clips
    countInput: NumOfClips
    countInputOffset: 1

imports:
  - name: FlowVideoPromptProducer
    path: ../../_shared/flow-video/flow-video.yaml
  - name: ImageProducer
    producer: image/text-to-image
    loop: clip
  - name: ImageToVideoProducer
    producer: video/image-to-video
    loop: clip
  - name: AudioProducer
    producer: audio/text-to-speech
    loop: clip
  - name: TimelineComposer
    producer: composition/timeline-composer

connections:
  - from: InquiryPrompt
    to: FlowVideoPromptProducer.InquiryPrompt
  - from: Audience
    to: FlowVideoPromptProducer.Audience
  - from: Duration
    to: FlowVideoPromptProducer.Duration
  - from: Style
    to: FlowVideoPromptProducer.Style
  - from: NumOfClips
    to: FlowVideoPromptProducer.NumOfClips

  - from: FlowVideoPromptProducer.ImagePrompts[image]
    to: ImageProducer[image].Prompt
  - from: Resolution
    to: ImageProducer[image].Resolution

  - from: FlowVideoPromptProducer.VideoPrompts[clip]
    to: ImageToVideoProducer[clip].Prompt
  - from: ImageProducer[image].GeneratedImage
    to: ImageToVideoProducer[clip].StartImage
  - from: ImageProducer[image+1].GeneratedImage
    to: ImageToVideoProducer[clip].EndImage
  - from: Resolution
    to: ImageToVideoProducer[clip].Resolution
  - from: ClipDuration
    to: ImageToVideoProducer[clip].Duration
  - from: ImageToVideoProducer[clip].GeneratedVideo
    to: ClipVideo[clip]
  - from: ImageToVideoProducer[clip].GeneratedVideo
    to: TimelineComposer.VideoClips

  - from: FlowVideoPromptProducer.NarrationScript[clip]
    to: AudioProducer[clip].Text
  - from: ClipDuration
    to: AudioProducer[clip].Duration
  - from: VoiceId
    to: AudioProducer[clip].VoiceId
  - from: Emotion
    to: AudioProducer[clip].Emotion
  - from: AudioProducer[clip].GeneratedAudio
    to: ClipAudio[clip]
  - from: AudioProducer[clip].GeneratedAudio
    to: TimelineComposer.AudioClips

  - from: Duration
    to: TimelineComposer.Duration
  - from: TimelineComposer.Timeline
    to: Timeline
