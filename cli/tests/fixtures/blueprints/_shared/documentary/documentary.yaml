meta:
  name: Documentary Script Generation
  description: Generate documentary scripts tailored to the user inquiry.
  id: DocumentaryPromptProducer
  kind: producer
  version: 0.1.0
  author: Renku
  license: MIT
  promptFile: ./documentary.toml
  outputSchema: ./documentary-output.json

inputs:
  - name: InquiryPrompt
    description: The topic describing the desired movie script.
    type: string
  - name: Duration
    description: Desired narration duration in seconds.
    type: int
  - name: NumOfClips
    description: Number of narration clips to produce.
    type: int
  - name: NumOfImagesPerClip
    description: Number of images to generate per narrative clip. Model default varies.
    type: int
  - name: Style
    description: Text describing the image style to be used.
    type: string

outputs:
  - name: VideoScript
    description: The generated video script for the documentary.
    type: json
    arrays:
      - path: Clips
        countInput: NumOfClips
      - path: Clips.ImagePrompts
        countInput: NumOfImagesPerClip

loops:
  - name: clip
    description: Iterates over narration clips.
    countInput: NumOfClips
