meta:
  name: Historical Short Story
  description: Generate short historical documentary videos (20-60s) with cut-scene transitions, narration, and thematic music
  id: HistoricalShortStory
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: Duration
    description: Total video duration in seconds.
    type: int
    required: true
  - name: NumOfClips
    description: Number of narrative clips.
    type: int
    required: true
  - name: Topic
    description: The historical topic to narrate (e.g., "Opium Wars in 19th century China")
    type: string
    required: true
  - name: CutScenesPerClip
    description: Number of cut-scenes per clip (2-3), used in video prompt [cut] markers
    type: int
    required: true
  - name: VisualStyle
    description: Visual/artistic style directions (e.g., cinematic documentary, painterly historical)
    type: string
    required: true
  - name: NarratorTone
    description: Tone for the narrator (e.g., authoritative, storytelling, dramatic)
    type: string
    required: true
  - name: VoiceId
    description: Voice identifier for narration audio.
    type: string
    required: true
  - name: Resolution
    description: Video resolution as width/height pixel dimensions
    type: resolution
    required: true

outputs:
  - name: InitialImage
    description: The generated opening frame image
    type: image
  - name: ClipVideos
    description: Generated video clips per clip (each contains internal cut-scenes)
    type: array
    itemType: video
    countInput: NumOfClips
  - name: ClipAudios
    description: Generated narration audio per clip
    type: array
    itemType: audio
    countInput: NumOfClips
  - name: Music
    description: Background music for the video
    type: audio
  - name: Timeline
    description: Composed timeline JSON manifest
    type: json
  - name: Transcription
    description: Word-level transcription with timestamps
    type: json
  - name: FinalVideo
    description: Final rendered MP4 video
    type: video

loops:
  - name: clip
    description: Iterates over narrative clips
    countInput: NumOfClips

imports:
  - name: HistoryScriptwriter
    path: ./history-scriptwriter/history-scriptwriter.yaml
  - name: InitialImageProducer
    producer: image/text-to-image
  - name: VideoProducer
    producer: video/image-to-video
    loop: clip
  - name: NarrationProducer
    producer: audio/text-to-speech
    loop: clip
  - name: MusicProducer
    producer: audio/text-to-music
  - name: TimelineComposer
    producer: composition/timeline-composer
  - name: TranscriptionProducer
    producer: json/transcription
  - name: VideoExporter
    producer: composition/video-exporter

connections:
  # ============================================
  # Wire inputs to HistoryScriptwriter
  # ============================================
  - from: Topic
    to: HistoryScriptwriter.Topic
  - from: Duration
    to: HistoryScriptwriter.Duration
  - from: NumOfClips
    to: HistoryScriptwriter.NumOfClips
  - from: ClipDuration
    to: HistoryScriptwriter.ClipDuration
  - from: CutScenesPerClip
    to: HistoryScriptwriter.CutScenesPerClip
  - from: VisualStyle
    to: HistoryScriptwriter.VisualStyle
  - from: NarratorTone
    to: HistoryScriptwriter.NarratorTone

  # ============================================
  # Generate the initial opening image
  # ============================================
  - from: HistoryScriptwriter.InitialImagePrompt
    to: InitialImageProducer.Prompt
  - from: Resolution
    to: InitialImageProducer.Resolution
  - from: InitialImageProducer.GeneratedImage
    to: InitialImage

  # ============================================
  # Wire prompts to VideoProducer (per clip)
  # Video prompts contain [cut] markers for internal scene transitions
  # ============================================
  - from: HistoryScriptwriter.VideoPrompts[clip]
    to: VideoProducer[clip].Prompt
  - from: Resolution
    to: VideoProducer[clip].Resolution
  - from: ClipDuration
    to: VideoProducer[clip].Duration

  # First clip gets the initial generated image as StartImage
  - from: InitialImageProducer.GeneratedImage
    to: VideoProducer[0].StartImage

  # Subsequent clips get LastFrame from previous clip (frame continuity)
  - from: VideoProducer[clip-1].LastFrame
    to: VideoProducer[clip].StartImage

  # Output clip videos
  - from: VideoProducer[clip].GeneratedVideo
    to: ClipVideos[clip]

  # ============================================
  # Wire narration to NarrationProducer (per clip)
  # ============================================
  - from: HistoryScriptwriter.NarrationScripts[clip]
    to: NarrationProducer[clip].Text
  - from: ClipDuration
    to: NarrationProducer[clip].Duration
  - from: VoiceId
    to: NarrationProducer[clip].VoiceId
  - from: NarrationProducer[clip].GeneratedAudio
    to: ClipAudios[clip]

  # ============================================
  # Wire music prompt to MusicProducer
  # ============================================
  - from: HistoryScriptwriter.MusicPrompt
    to: MusicProducer.Prompt
  - from: Duration
    to: MusicProducer.Duration
  - from: MusicProducer.GeneratedMusic
    to: Music

  # ============================================
  # Wire to TimelineComposer
  # ============================================
  - from: VideoProducer[clip].GeneratedVideo
    to: TimelineComposer.VideoClips
  - from: NarrationProducer[clip].GeneratedAudio
    to: TimelineComposer.AudioClips
  - from: MusicProducer.GeneratedMusic
    to: TimelineComposer.Music
  - from: Duration
    to: TimelineComposer.Duration
  - from: TimelineComposer.Timeline
    to: Timeline

  # Wire audio to TimelineComposer for Transcription track
  - from: NarrationProducer[clip].GeneratedAudio
    to: TimelineComposer.TranscriptionAudio

  # ============================================
  # Wire to TranscriptionProducer
  # ============================================
  - from: TimelineComposer.Timeline
    to: TranscriptionProducer.Timeline

  # ============================================
  # Wire to VideoExporter
  # ============================================
  - from: TimelineComposer.Timeline
    to: VideoExporter.Timeline
  - from: Duration
    to: VideoExporter.Duration
  - from: TranscriptionProducer.Transcription
    to: VideoExporter.Transcription
  - from: VideoExporter.FinalVideo
    to: FinalVideo
  - from: TranscriptionProducer.Transcription
    to: Transcription
