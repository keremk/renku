meta:
  name: Continuous Multi-Clip Video
  description: Generate continuous video with narration and music, where each clip starts with the last frame of the previous clip.
  id: ContinuousVideo
  kind: blueprint
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: Duration
    description: Total video duration in seconds.
    type: int
    required: true
  - name: NumOfClips
    description: Number of video clips to produce.
    type: int
    required: true
  - name: InquiryPrompt
    description: The scenario describing the desired video (e.g., cyclist cycling through gorgeous landscape).
    type: string
    required: true
  - name: CameraStyle
    description: Camera movement style (e.g., tracking shot, aerial, handheld, dolly).
    type: string
    required: true
  - name: VisualStyle
    description: Visual/artistic style (e.g., cinematic, anime, photorealistic, Ghibli).
    type: string
    required: true
  - name: VoiceId
    description: Voice identifier for narration audio.
    type: string
    required: true
  - name: Emotion
    description: Emotional tone for narration audio.
    type: string
    required: false
  - name: Resolution
    description: Video resolution as width/height pixel dimensions.
    type: resolution
    required: true

outputs:
  - name: ClipVideo
    description: Generated video clips with frame continuity.
    type: array
    itemType: video
    countInput: NumOfClips
  - name: ClipAudio
    description: Generated narration audio per clip.
    type: array
    itemType: audio
    countInput: NumOfClips
  - name: InitialImage
    description: The generated starting frame image.
    type: image
  - name: Music
    description: Background music for the video.
    type: audio
  - name: Timeline
    description: Composed timeline JSON manifest.
    type: json
  - name: FinalVideo
    description: Final rendered MP4 video.
    type: video

loops:
  - name: clip
    description: Iterates over video clips.
    countInput: NumOfClips

imports:
  - name: ScenarioPromptProducer
    path: ./scenario-prompt/scenario-prompt.yaml
  - name: InitialImageProducer
    producer: image/text-to-image
  - name: VideoProducer
    producer: video/image-to-video
    loop: clip
  - name: AudioProducer
    producer: audio/text-to-speech
    loop: clip
  - name: MusicProducer
    producer: audio/text-to-music
  - name: TimelineComposer
    producer: composition/timeline-composer
  - name: TranscriptionProducer
    producer: json/transcription
  - name: VideoExporter
    producer: composition/video-exporter

connections:
  # Wire inputs to ScenarioPromptProducer
  - from: InquiryPrompt
    to: ScenarioPromptProducer.InquiryPrompt
  - from: Duration
    to: ScenarioPromptProducer.Duration
  - from: NumOfClips
    to: ScenarioPromptProducer.NumOfClips
  - from: ClipDuration
    to: ScenarioPromptProducer.ClipDuration
  - from: CameraStyle
    to: ScenarioPromptProducer.CameraStyle
  - from: VisualStyle
    to: ScenarioPromptProducer.VisualStyle

  # Generate the initial starting image
  - from: ScenarioPromptProducer.InitialImagePrompt
    to: InitialImageProducer.Prompt
  - from: Resolution
    to: InitialImageProducer.Resolution
  - from: InitialImageProducer.GeneratedImage
    to: InitialImage

  # Wire prompts to VideoProducer (all clips)
  - from: ScenarioPromptProducer.VideoPrompts[clip]
    to: VideoProducer[clip].Prompt
  - from: Resolution
    to: VideoProducer[clip].Resolution
  - from: ClipDuration
    to: VideoProducer[clip].Duration

  # First clip gets the initial generated image as StartImage
  - from: InitialImageProducer.GeneratedImage
    to: VideoProducer[0].StartImage

  # Subsequent clips get LastFrame from previous clip (sliding window)
  - from: VideoProducer[clip-1].LastFrame
    to: VideoProducer[clip].StartImage

  # Output clip videos
  - from: VideoProducer[clip].GeneratedVideo
    to: ClipVideo[clip]

  # Wire narration to AudioProducer
  - from: ScenarioPromptProducer.NarrationScript[clip]
    to: AudioProducer[clip].Text
  - from: ClipDuration
    to: AudioProducer[clip].Duration
  - from: VoiceId
    to: AudioProducer[clip].VoiceId
  - from: Emotion
    to: AudioProducer[clip].Emotion
  - from: AudioProducer[clip].GeneratedAudio
    to: ClipAudio[clip]

  # Wire music prompt to MusicProducer
  - from: ScenarioPromptProducer.MusicPrompt
    to: MusicProducer.Prompt
  - from: Duration
    to: MusicProducer.Duration
  - from: MusicProducer.GeneratedMusic
    to: Music

  # Wire to TimelineComposer
  - from: VideoProducer[clip].GeneratedVideo
    to: TimelineComposer.VideoClips
  - from: AudioProducer[clip].GeneratedAudio
    to: TimelineComposer.AudioClips
  - from: MusicProducer.GeneratedMusic
    to: TimelineComposer.Music
  - from: Duration
    to: TimelineComposer.Duration
  - from: TimelineComposer.Timeline
    to: Timeline

  # Wire audio to TimelineComposer for Transcription track
  - from: AudioProducer[clip].GeneratedAudio
    to: TimelineComposer.TranscriptionAudio

  # Wire to VideoExporter
  - from: TimelineComposer.Timeline
    to: VideoExporter.Timeline
  - from: Duration
    to: VideoExporter.Duration
  - from: Resolution
    to: VideoExporter.Resolution
  - from: TimelineComposer.Timeline
    to: TranscriptionProducer.Timeline
  - from: TranscriptionProducer.Transcription
    to: VideoExporter.Transcription
  - from: VideoExporter.FinalVideo
    to: FinalVideo
