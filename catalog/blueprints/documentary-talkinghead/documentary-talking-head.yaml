meta:
  name: Documentary Talking Head with Conditional Edges
  description: A documentary with image and video narratives and optional talking heads.
  id: Documentary
  kind: blueprint
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: Duration
    description: Total video duration in seconds.
    type: int
    required: true
  - name: NumOfClips
    description: Number of documentary clips.
    type: int
    required: true
  - name: InquiryPrompt
    description: The topic describing the desired documentary.
    type: string
    required: true
  - name: NumOfImagesPerClip
    description: Number of images per clip.
    type: int
    required: true
  - name: Resolution
    description: Video and image resolution as width/height pixel dimensions.
    type: resolution
  - name: Style
    description: Image style.
    type: string
    required: true
  - name: VoiceId
    description: Voice identifier.
    type: string
    required: true
  - name: TalkingHeadVoiceId
    description: Voice identifier for talking head narration.
    type: string
    required: true

outputs:
  - name: TalkingHeadCharacterImage
    description: Generated talking head character image.
    type: array
    itemType: image
  - name: ClipImage
    description: Generated images (conditional).
    type: multiDimArray
    itemType: image
  - name: ClipAudio
    description: Generated audio (conditional).
    type: array
    itemType: audio
  - name: ClipVideo
    description: Generated video (conditional).
    type: array
    itemType: video
  - name: ClipTalkingHeadVideo
    description: Generated talking head videos (conditional).
    type: array
    itemType: video
  - name: Timeline
    description: Generated timeline JSON.
    type: json

loops:
  - name: clip
    countInput: NumOfClips
  - name: image
    parent: clip
    countInput: NumOfImagesPerClip

# Named condition definitions (referenced by 'if:' on edges)
conditions:
  isImageNarration:
    any:
      - when: DocProducer.VideoScript.Clips[clip].NarrationType
        is: 'MapNarration'
      - when: DocProducer.VideoScript.Clips[clip].NarrationType
        is: 'ImageNarration'
  isAudioNeeded:
    any:
      - when: DocProducer.VideoScript.Clips[clip].NarrationType
        is: 'TalkingHead'
      - when: DocProducer.VideoScript.Clips[clip].UseNarrationAudio
        is: true
  isTalkingHead:
    when: DocProducer.VideoScript.Clips[clip].NarrationType
    is: 'TalkingHead'
  isVideoNarration:
    when: DocProducer.VideoScript.Clips[clip].NarrationType
    is: 'VideoNarration'

imports:
  - name: DocProducer
    path: ./documentary-talkinghead/documentary-talkinghead.yaml
  - name: ImageProducer
    producer: image/text-to-image
    loop: clip.image
    if: isImageNarration
  - name: AudioProducer
    producer: audio/text-to-speech
    loop: clip
    if: isAudioNeeded
  - name: VideoProducer
    producer: video/text-to-video
    loop: clip
    if: isVideoNarration
  - name: TalkingHeadImageProducer
    producer: image/text-to-image
    loop: clip
    if: isTalkingHead
  - name: TalkingHeadVideoProducer
    producer: video/text-to-talking-head
    loop: clip
    if: isTalkingHead
  - name: TimelineComposer
    producer: composition/timeline-composer

connections:
  # Wire inputs to DocProducer
  - from: InquiryPrompt
    to: DocProducer.InquiryPrompt
  - from: NumOfClips
    to: DocProducer.NumOfClips
  - from: NumOfImagesPerClip
    to: DocProducer.NumOfImagesPerClip
  - from: Duration
    to: DocProducer.Duration
  - from: Style
    to: DocProducer.Style

  # Conditional: ImageProducer only when NarrationType is ImageNarration
  - from: DocProducer.VideoScript.Clips[clip].ImagePrompts[image]
    to: ImageProducer[clip][image].Prompt
  - from: Resolution
    to: ImageProducer[clip][image].Resolution
  - from: ImageProducer[clip][image].GeneratedImage
    to: ClipImage[clip][image]
    if: isImageNarration

  # Conditional: AudioProducer only when audio is needed.
  - from: DocProducer.VideoScript.Clips[clip].Script
    to: AudioProducer[clip].Text
  - from: ClipDuration
    to: AudioProducer[clip].Duration
  - from: VoiceId
    to: AudioProducer[clip].VoiceId
  - from: AudioProducer[clip].GeneratedAudio
    to: ClipAudio[clip]
    if: isAudioNeeded

  # Conditional: Create Talking Head Image only when NarrationType is TalkingHead
  - from: DocProducer.VideoScript.Clips[clip].TalkingHeadCharacterPrompt
    to: TalkingHeadImageProducer[clip].Prompt
  - from: Resolution
    to: TalkingHeadImageProducer[clip].Resolution
  - from: TalkingHeadImageProducer[clip].GeneratedImage
    to: TalkingHeadCharacterImage[clip]
    if: isTalkingHead

  # Conditional: TalkingHeadVideoProducer only when NarrationType is TalkingHead
  - from: ClipDuration
    to: TalkingHeadVideoProducer[clip].Duration
  - from: Resolution
    to: TalkingHeadVideoProducer[clip].Resolution
  - from: DocProducer.VideoScript.Clips[clip].TalkingHeadText
    to: TalkingHeadVideoProducer[clip].NarrativeText
  - from: DocProducer.VideoScript.Clips[clip].TalkingHeadPrompt
    to: TalkingHeadVideoProducer[clip].Prompt
  - from: TalkingHeadImageProducer[clip].GeneratedImage
    to: TalkingHeadVideoProducer[clip].CharacterImage
  - from: TalkingHeadVoiceId
    to: TalkingHeadVideoProducer[clip].VoiceId
  - from: TalkingHeadVideoProducer[clip].GeneratedVideo
    to: ClipTalkingHeadVideo[clip]
    if: isTalkingHead

  # Conditional: VideoProducer only when NarrationType is VideoNarration
  - from: DocProducer.VideoScript.Clips[clip].VideoPrompt
    to: VideoProducer[clip].Prompt
  - from: ClipDuration
    to: VideoProducer[clip].Duration
  - from: Resolution
    to: VideoProducer[clip].Resolution
  - from: VideoProducer[clip].GeneratedVideo
    to: ClipVideo[clip]
    if: isVideoNarration

  - from: AudioProducer[clip].GeneratedAudio
    to: TimelineComposer.AudioClips
    if: isAudioNeeded
  - from: VideoProducer[clip].GeneratedVideo
    to: TimelineComposer.VideoClips
    if: isVideoNarration
  - from: ImageProducer[clip][image].GeneratedImage
    to: TimelineComposer.ImageClips
    if: isImageNarration
  - from: TalkingHeadVideoProducer[clip].GeneratedVideo
    to: TimelineComposer.VideoClips
    if: isTalkingHead
  - from: Duration
    to: TimelineComposer.Duration
  - from: TimelineComposer.Timeline
    to: Timeline
