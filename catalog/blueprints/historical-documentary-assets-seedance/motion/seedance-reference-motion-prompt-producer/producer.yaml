meta:
  name: Seedance Reference Motion Prompt Producer
  description: Builds a Seedance 2.0 reference-to-video prompt for one historical character bundle.
  id: SeedanceReferenceMotionPromptProducer
  kind: producer
  version: 0.1.0
  author: Renku
  license: MIT
  promptFile: ./prompts.toml
  outputSchema: ./output-schema.json

inputs:
  - name: SubjectAndAction
    description: Core visible subject and action.
    type: string
  - name: CameraIntent
    description: Camera movement and framing intent.
    type: string
  - name: AudioIntent
    description: Sound design intent when native audio is wanted.
    type: string
  - name: EnvironmentAndStyle
    description: Environment and visual texture.
    type: string
  - name: UseNativeAudio
    description: Whether native audio is wanted.
    type: boolean
  - name: ReferenceCharacterName
    description: Name of the referenced historical character.
    type: string

outputs:
  - name: Prompt
    description: Final Seedance reference-to-video prompt.
    type: string
