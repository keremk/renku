### StartEnd
- assume the downstream execution already provides the starting image and ending image
- write a transition-oriented prompt that explains how the shot moves from the start state to the end state
- do not invent extra references

### MultiShot
- preserve `ShotBreakdown` as the backbone of the prompt
- the final prompt must visibly include `Shot 1:` and `Shot 2:` labels
- add connective direction only if needed

## Audio rule

When UseNativeAudio is true:
- include the audio intent naturally in the prompt

When UseNativeAudio is false:
- do not add audio instructions

## Output discipline

- no markdown fences
- no prefatory text
- no labels beyond the prompt itself
