meta:
  name: Historical Documentary Assets Seedance
  description: An asset-only historical documentary pipeline that stays generic across topics while using Seedance 2.0-specific motion generation paths for short clips that need tighter control and reference-aware prompting.
  id: HistoricalDocumentaryAssetsSeedance
  kind: blueprint
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: InquiryPrompt
    description: The historical topic, guiding question, or documentary framing.
    type: string
    required: true
  - name: Duration
    description: Total documentary runtime in seconds.
    type: int
    required: true
  - name: NumOfClips
    description: Number of documentary clips to plan.
    type: int
    required: true
  - name: NumOfImagesPerClip
    description: Number of still-image assets to generate per clip. Use at least 2 if you want the planner to choose start/end Seedance transitions.
    type: int
    required: true
  - name: NumOfExperts
    description: Number of recurring experts to cast for optional talking-head clips.
    type: int
    required: true
  - name: NumOfHistoricalCharacters
    description: Number of recurring historical character reference bundles to design.
    type: int
    required: true
  - name: Style
    description: Shared visual language for the documentary assets.
    type: string
    required: true
  - name: Audience
    description: Target audience for tone and explanation depth.
    type: string
    required: true
  - name: LanguageCode
    description: ISO language code for narration and expert speech.
    type: string
    required: false
  - name: Resolution
    description: Shared output resolution for generated image and video assets.
    type: resolution
    required: true
  - name: ExpertEnvironment
    description: Description of the interview-style environment where the experts appear on camera.
    type: string
    required: true

outputs:
  - name: AssetPlan
    description: Structured JSON asset plan for downstream assembly agents and compositors.
    type: json
  - name: ExpertSet
    description: Structured recurring expert metadata for downstream reuse.
    type: json
  - name: HistoricalCharacterSet
    description: Structured recurring historical character metadata for downstream reuse.
    type: json
  - name: ScenePlanMarkdown
    description: Scene-by-scene markdown plan listing the intended asset ordering for the external compositor.
    type: string
  - name: ClipNarrationAudio
    description: Narration audio generated for each documentary clip.
    type: array
    itemType: audio
    countInput: NumOfClips
  - name: ClipStillImages
    description: Plain text-generated still-image b-roll assets for each clip.
    type: multiDimArray
    itemType: image
  - name: ClipReferenceStillImages
    description: Reference-composed still-image b-roll assets keyed by clip, image, and historical character.
    type: multiDimArray
    itemType: image
  - name: ClipMapImages
    description: Map image assets for clips that need geographic grounding.
    type: array
    itemType: image
    countInput: NumOfClips
  - name: ClipMotionVideos
    description: Seedance motion clips generated through the workflow-selected Seedance video generator.
    type: array
    itemType: video
    countInput: NumOfClips
  - name: ClipMotionHistoricalCharacterReferences
    description: Boolean selector matrix showing which historical character reference bundle was selected for each reference motion clip.
    type: multiDimArray
    itemType: boolean
  - name: ExpertPortraits
    description: Canonical expert portrait images used as the consistent talking-head anchor.
    type: array
    itemType: image
    countInput: NumOfExperts
  - name: HistoricalCharacterSheets
    description: Production-style historical character model sheets used as reference assets.
    type: array
    itemType: image
    countInput: NumOfHistoricalCharacters
  - name: HistoricalPortraits
    description: Canonical historical character portraits used as downstream reference assets.
    type: array
    itemType: image
    countInput: NumOfHistoricalCharacters
  - name: ClipExpertTalkingHeadAudio
    description: Expert speech audio for clip and expert combinations that are used.
    type: multiDimArray
    itemType: audio
  - name: ClipExpertTalkingHeadVideos
    description: Lip-synced expert talking-head videos for clip and expert combinations that are used.
    type: multiDimArray
    itemType: video

loops:
  - name: clip
    description: Iterates over documentary clips.
    countInput: NumOfClips
  - name: image
    description: Iterates over still-image assets within a clip.
    parent: clip
    countInput: NumOfImagesPerClip
  - name: expert
    description: Iterates over recurring documentary experts.
    countInput: NumOfExperts
  - name: historicalcharacter
    description: Iterates over recurring historical characters.
    countInput: NumOfHistoricalCharacters

conditions:
  hasMap:
    when: PlanDirector.AssetPlan.Clips[clip].HasMap
    is: true
  imageUsesHistoricalReference:
    when: PlanDirector.AssetPlan.Clips[clip].ImagePlans[image].UseHistoricalReference
    is: true
  imageUsesPlainGeneration:
    when: PlanDirector.AssetPlan.Clips[clip].ImagePlans[image].UseHistoricalReference
    is: false
  imageUsesPlainGenerationOrStartEndAnchor:
    any:
      - when: PlanDirector.AssetPlan.Clips[clip].ImagePlans[image].UseHistoricalReference
        is: false
      - when: PlanDirector.AssetPlan.Clips[clip].MotionPlan.Workflow
        is: StartEnd
  imageReferencesHistoricalCharacter:
    all:
      - when: PlanDirector.AssetPlan.Clips[clip].ImagePlans[image].UseHistoricalReference
        is: true
      - when: PlanDirector.AssetPlan.Clips[clip].ImagePlans[image].HistoricalCharacterReferences[historicalcharacter].UseReference
        is: true
  motionEnabled:
    when: PlanDirector.AssetPlan.Clips[clip].MotionPlan.Enabled
    is: true
  motionIsText:
    when: PlanDirector.AssetPlan.Clips[clip].MotionPlan.Workflow
    is: Text
  motionIsReference:
    when: PlanDirector.AssetPlan.Clips[clip].MotionPlan.Workflow
    is: Reference
  motionIsStartEnd:
    when: PlanDirector.AssetPlan.Clips[clip].MotionPlan.Workflow
    is: StartEnd
  motionIsStartEndWithPlainAnchors:
    all:
      - when: PlanDirector.AssetPlan.Clips[clip].MotionPlan.Workflow
        is: StartEnd
      - when: PlanDirector.AssetPlan.Clips[clip].ImagePlans[0].UseHistoricalReference
        is: false
      - when: PlanDirector.AssetPlan.Clips[clip].ImagePlans[1].UseHistoricalReference
        is: false
  motionIsMultiShot:
    when: PlanDirector.AssetPlan.Clips[clip].MotionPlan.Workflow
    is: MultiShot
  motionUsesNativeAudio:
    when: PlanDirector.AssetPlan.Clips[clip].MotionPlan.UseNativeAudio
    is: true
  motionReferencesHistoricalCharacter:
    all:
      - when: PlanDirector.AssetPlan.Clips[clip].MotionPlan.Workflow
        is: Reference
      - when: PlanDirector.AssetPlan.Clips[clip].MotionPlan.HistoricalCharacterReferences[historicalcharacter].UseReference
        is: true
  hasExpertTalkingHead:
    when: PlanDirector.AssetPlan.Clips[clip].ExpertTalkingHeads[expert].UseThisExpert
    is: true

imports:
  - name: ExpertCastingDirector
    path: ./planning/expert-casting-director/producer.yaml
  - name: HistoricalCharacterDirector
    path: ./planning/historical-character-director/producer.yaml
  - name: PlanDirector
    path: ./planning/documentary-plan-director/producer.yaml
  - name: NarrationAudioProducer
    producer: audio/text-to-speech
    loop: clip
  - name: ClipPlainImageProducer
    producer: image/text-to-image
    loop: clip.image
    if: imageUsesPlainGenerationOrStartEndAnchor
  - name: ClipReferenceImageProducer
    producer: image/image-compose
    loop: clip.image.historicalcharacter
    if: imageReferencesHistoricalCharacter
  - name: HistoricalReferenceStillPromptProducer
    path: ./stills/historical-reference-still-prompt-producer/producer.yaml
    loop: clip.image.historicalcharacter
    if: imageReferencesHistoricalCharacter
  - name: MapImageProducer
    producer: image/text-to-image
    loop: clip
    if: hasMap
  - name: SeedanceVideoGenerator
    producer: video/seedance-video-generator
    loop: clip
    if: motionEnabled
  - name: ExpertPortraitProducer
    producer: image/text-to-image
    loop: expert
  - name: HistoricalCharacterAssetsProducer
    path: ./characters/historical-character-assets.yaml
    loop: historicalcharacter
  - name: ExpertTalkingHeadAudioProducer
    producer: audio/text-to-speech
    loop: clip.expert
    if: hasExpertTalkingHead
  - name: ExpertTalkingHeadVideoProducer
    producer: video/talking-head
    loop: clip.expert
    if: hasExpertTalkingHead

connections:
  - from: InquiryPrompt
    to: ExpertCastingDirector.InquiryPrompt
  - from: Duration
    to: ExpertCastingDirector.Duration
  - from: NumOfClips
    to: ExpertCastingDirector.NumOfClips
  - from: NumOfExperts
    to: ExpertCastingDirector.NumOfExperts
  - from: Style
    to: ExpertCastingDirector.Style
  - from: Audience
    to: ExpertCastingDirector.Audience
  - from: ExpertEnvironment
    to: ExpertCastingDirector.ExpertEnvironment

  - from: InquiryPrompt
    to: HistoricalCharacterDirector.InquiryPrompt
  - from: NumOfHistoricalCharacters
    to: HistoricalCharacterDirector.NumOfHistoricalCharacters
  - from: Style
    to: HistoricalCharacterDirector.Style
  - from: Audience
    to: HistoricalCharacterDirector.Audience

  - from: InquiryPrompt
    to: PlanDirector.InquiryPrompt
  - from: Duration
    to: PlanDirector.Duration
  - from: NumOfClips
    to: PlanDirector.NumOfClips
  - from: NumOfImagesPerClip
    to: PlanDirector.NumOfImagesPerClip
  - from: NumOfExperts
    to: PlanDirector.NumOfExperts
  - from: NumOfHistoricalCharacters
    to: PlanDirector.NumOfHistoricalCharacters
  - from: ClipDuration
    to: PlanDirector.ClipDuration
  - from: Style
    to: PlanDirector.Style
  - from: Audience
    to: PlanDirector.Audience
  - from: LanguageCode
    to: PlanDirector.LanguageCode
  - from: ExpertEnvironment
    to: PlanDirector.ExpertEnvironment
  - from: ExpertCastingDirector.ExpertSet
    to: PlanDirector.ExpertSet
  - from: HistoricalCharacterDirector.HistoricalCharacterSet
    to: PlanDirector.HistoricalCharacterSet

  - from: PlanDirector.AssetPlan
    to: AssetPlan
  - from: ExpertCastingDirector.ExpertSet
    to: ExpertSet
  - from: HistoricalCharacterDirector.HistoricalCharacterSet
    to: HistoricalCharacterSet
  - from: PlanDirector.AssetPlan.ScenePlanMarkdown
    to: ScenePlanMarkdown

  - from: ExpertCastingDirector.ExpertSet.Experts[expert].PortraitPrompt
    to: ExpertPortraitProducer[expert].Prompt
  - from: Resolution
    to: ExpertPortraitProducer[expert].Resolution
  - from: ExpertPortraitProducer[expert].GeneratedImage
    to: ExpertPortraits[expert]

  - from: HistoricalCharacterDirector.HistoricalCharacterSet.HistoricalCharacters[historicalcharacter].CharacterSheetPrompt
    to: HistoricalCharacterAssetsProducer[historicalcharacter].CharacterSheetPrompt
  - from: Resolution
    to: HistoricalCharacterAssetsProducer[historicalcharacter].Resolution
  - from: HistoricalCharacterDirector.HistoricalCharacterSet.HistoricalCharacters[historicalcharacter].PortraitPrompt
    to: HistoricalCharacterAssetsProducer[historicalcharacter].PortraitPrompt
  - from: HistoricalCharacterAssetsProducer[historicalcharacter].CharacterSheet
    to: HistoricalCharacterSheets[historicalcharacter]
  - from: HistoricalCharacterAssetsProducer[historicalcharacter].Portrait
    to: HistoricalPortraits[historicalcharacter]

  - from: PlanDirector.AssetPlan.Clips[clip].NarrationScript
    to: NarrationAudioProducer[clip].Text
  - from: ExpertCastingDirector.ExpertSet.NarratorVoiceId
    to: NarrationAudioProducer[clip].VoiceId
  - from: LanguageCode
    to: NarrationAudioProducer[clip].LanguageCode
  - from: ClipDuration
    to: NarrationAudioProducer[clip].Duration
  - from: NarrationAudioProducer[clip].GeneratedAudio
    to: ClipNarrationAudio[clip]

  - from: PlanDirector.AssetPlan.Clips[clip].ImagePlans[image].Prompt
    to: ClipPlainImageProducer[clip][image].Prompt
  - from: Resolution
    to: ClipPlainImageProducer[clip][image].Resolution
  - from: ClipPlainImageProducer[clip][image].GeneratedImage
    to: ClipStillImages[clip][image]
    if: imageUsesPlainGenerationOrStartEndAnchor

  - from: PlanDirector.AssetPlan.Clips[clip].ImagePlans[image].Prompt
    to: HistoricalReferenceStillPromptProducer[clip][image][historicalcharacter].BasePrompt
  - from: HistoricalCharacterDirector.HistoricalCharacterSet.HistoricalCharacters[historicalcharacter].DisplayName
    to: HistoricalReferenceStillPromptProducer[clip][image][historicalcharacter].ReferenceCharacterName
  - from: HistoricalReferenceStillPromptProducer[clip][image][historicalcharacter].Prompt
    to: ClipReferenceImageProducer[clip][image][historicalcharacter].Prompt
  - from: HistoricalCharacterAssetsProducer[historicalcharacter].Portrait
    to: ClipReferenceImageProducer[clip][image][historicalcharacter].SourceImages[0]
  - from: HistoricalCharacterAssetsProducer[historicalcharacter].CharacterSheet
    to: ClipReferenceImageProducer[clip][image][historicalcharacter].SourceImages[1]
  - from: Resolution
    to: ClipReferenceImageProducer[clip][image][historicalcharacter].Resolution
  - from: ClipReferenceImageProducer[clip][image][historicalcharacter].ComposedImage
    to: ClipReferenceStillImages[clip][image][historicalcharacter]
    if: imageReferencesHistoricalCharacter

  - from: PlanDirector.AssetPlan.Clips[clip].MapPrompt
    to: MapImageProducer[clip].Prompt
  - from: Resolution
    to: MapImageProducer[clip].Resolution
  - from: MapImageProducer[clip].GeneratedImage
    to: ClipMapImages[clip]
    if: hasMap

  - from: PlanDirector.AssetPlan.Clips[clip].MotionPlan.Workflow
    to: SeedanceVideoGenerator[clip].Workflow
  - from: PlanDirector.AssetPlan.Clips[clip].MotionPlan.SubjectAndAction
    to: SeedanceVideoGenerator[clip].SceneIntent
  - from: PlanDirector.AssetPlan.Clips[clip].MotionPlan.CameraIntent
    to: SeedanceVideoGenerator[clip].CameraIntent
  - from: PlanDirector.AssetPlan.Clips[clip].MotionPlan.AudioIntent
    to: SeedanceVideoGenerator[clip].AudioIntent
  - from: PlanDirector.AssetPlan.Clips[clip].MotionPlan.EnvironmentAndStyle
    to: SeedanceVideoGenerator[clip].EnvironmentAndStyle
  - from: PlanDirector.AssetPlan.Clips[clip].MotionPlan.EndingState
    to: SeedanceVideoGenerator[clip].EndFrameDescription
  - from: PlanDirector.AssetPlan.Clips[clip].MotionPlan.ShotBreakdown
    to: SeedanceVideoGenerator[clip].ShotBreakdown
  - from: PlanDirector.AssetPlan.Clips[clip].MotionPlan.ReferenceSubjectLabel
    to: SeedanceVideoGenerator[clip].ReferenceMediaInstructions
  - from: PlanDirector.AssetPlan.Clips[clip].MotionPlan.UseNativeAudio
    to: SeedanceVideoGenerator[clip].UseNativeAudio
  - from: PlanDirector.AssetPlan.Clips[clip].MotionPlan.StartEndAnchorsArePlain
    to: SeedanceVideoGenerator[clip].StartEndAnchorsArePlain
  - from: ClipDuration
    to: SeedanceVideoGenerator[clip].Duration
  - from: Resolution
    to: SeedanceVideoGenerator[clip].Resolution
  - from: ClipPlainImageProducer[clip][0].GeneratedImage
    to: SeedanceVideoGenerator[clip].StartImage
    if: motionIsStartEndWithPlainAnchors
  - from: ClipPlainImageProducer[clip][1].GeneratedImage
    to: SeedanceVideoGenerator[clip].EndImage
    if: motionIsStartEndWithPlainAnchors
  - from: HistoricalCharacterAssetsProducer[historicalcharacter].Portrait
    to: SeedanceVideoGenerator[clip].ReferenceImages
    groupBy: singleton
    orderBy: historicalcharacter
    if: motionReferencesHistoricalCharacter
  - from: HistoricalCharacterAssetsProducer[historicalcharacter].CharacterSheet
    to: SeedanceVideoGenerator[clip].ReferenceImages
    groupBy: singleton
    orderBy: historicalcharacter
    if: motionReferencesHistoricalCharacter
  - from: SeedanceVideoGenerator[clip].GeneratedVideo
    to: ClipMotionVideos[clip]
    if: motionEnabled
  - from: PlanDirector.AssetPlan.Clips[clip].MotionPlan.HistoricalCharacterReferences[historicalcharacter].UseReference
    to: ClipMotionHistoricalCharacterReferences[clip][historicalcharacter]

  - from: PlanDirector.AssetPlan.Clips[clip].ExpertTalkingHeads[expert].TalkingHeadText
    to: ExpertTalkingHeadAudioProducer[clip][expert].Text
  - from: ExpertCastingDirector.ExpertSet.Experts[expert].VoiceId
    to: ExpertTalkingHeadAudioProducer[clip][expert].VoiceId
  - from: LanguageCode
    to: ExpertTalkingHeadAudioProducer[clip][expert].LanguageCode
  - from: ClipDuration
    to: ExpertTalkingHeadAudioProducer[clip][expert].Duration
  - from: ExpertTalkingHeadAudioProducer[clip][expert].GeneratedAudio
    to: ClipExpertTalkingHeadAudio[clip][expert]
    if: hasExpertTalkingHead

  - from: PlanDirector.AssetPlan.Clips[clip].ExpertTalkingHeads[expert].TalkingHeadPrompt
    to: ExpertTalkingHeadVideoProducer[clip][expert].Prompt
  - from: ExpertPortraitProducer[expert].GeneratedImage
    to: ExpertTalkingHeadVideoProducer[clip][expert].CharacterImage
  - from: ExpertTalkingHeadAudioProducer[clip][expert].GeneratedAudio
    to: ExpertTalkingHeadVideoProducer[clip][expert].AudioUrl
  - from: ClipDuration
    to: ExpertTalkingHeadVideoProducer[clip][expert].Duration
  - from: Resolution
    to: ExpertTalkingHeadVideoProducer[clip][expert].Resolution
  - from: ExpertTalkingHeadVideoProducer[clip][expert].GeneratedVideo
    to: ClipExpertTalkingHeadVideos[clip][expert]
    if: hasExpertTalkingHead
