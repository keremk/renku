meta:
  name: Historical Documentary Assets Seedance
  description: An asset-only historical documentary pipeline that stays generic across topics while using Seedance 2.0-specific motion generation paths for short clips that need tighter control and reference-aware prompting.
  id: HistoricalDocumentaryAssetsSeedance
  kind: blueprint
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: InquiryPrompt
    description: The historical topic, guiding question, or documentary framing.
    type: string
    required: true
  - name: Duration
    description: Total documentary runtime in seconds.
    type: int
    required: true
  - name: NumOfSegments
    description: Number of documentary segments to plan.
    type: int
    required: true
  - name: NumOfImagesPerSegment
    description: Number of still-image assets to generate per segment. Use at least 2 if you want the planner to choose start/end Seedance transitions.
    type: int
    required: true
  - name: NumOfExperts
    description: Number of recurring experts to cast for optional talking-head segments.
    type: int
    required: true
  - name: NumOfHistoricalCharacters
    description: Number of recurring historical character reference bundles to design.
    type: int
    required: true
  - name: Style
    description: Shared visual language for the documentary assets.
    type: string
    required: true
  - name: Audience
    description: Target audience for tone and explanation depth.
    type: string
    required: true
  - name: LanguageCode
    description: ISO language code for narration and expert speech.
    type: string
    required: false
  - name: Resolution
    description: Shared output resolution for generated image and video assets.
    type: resolution
    required: true
  - name: ExpertEnvironment
    description: Description of the interview-style environment where the experts appear on camera.
    type: string
    required: true

outputs:
  - name: AssetPlan
    description: Structured JSON asset plan for downstream assembly agents and compositors.
    type: json
  - name: ExpertSet
    description: Structured recurring expert metadata for downstream reuse.
    type: json
  - name: HistoricalCharacterSet
    description: Structured recurring historical character metadata for downstream reuse.
    type: json
  - name: ScenePlanMarkdown
    description: Scene-by-scene markdown plan listing the intended asset ordering for the external compositor.
    type: string
  - name: SegmentNarrationAudio
    description: Narration audio generated for each documentary segment.
    type: array
    itemType: audio
    countInput: NumOfSegments
  - name: SegmentStillImages
    description: Plain text-generated still-image b-roll assets for each segment.
    type: multiDimArray
    itemType: image
  - name: SegmentReferenceStillImages
    description: Reference-composed still-image b-roll assets keyed by segment, image, and historical character.
    type: multiDimArray
    itemType: image
  - name: SegmentMapImages
    description: Map image assets for segments that need geographic grounding.
    type: array
    itemType: image
    countInput: NumOfSegments
  - name: SegmentMotionVideos
    description: Seedance motion clips generated through the workflow-selected Seedance video generator.
    type: array
    itemType: video
    countInput: NumOfSegments
  - name: SegmentMotionHistoricalCharacterReferences
    description: Boolean selector matrix showing which historical character reference bundle was selected for each reference motion clip.
    type: multiDimArray
    itemType: boolean
  - name: ExpertPortraits
    description: Canonical expert portrait images used as the consistent talking-head anchor.
    type: array
    itemType: image
    countInput: NumOfExperts
  - name: HistoricalCharacterSheets
    description: Production-style historical character model sheets used as reference assets.
    type: array
    itemType: image
    countInput: NumOfHistoricalCharacters
  - name: HistoricalPortraits
    description: Canonical historical character portraits used as downstream reference assets.
    type: array
    itemType: image
    countInput: NumOfHistoricalCharacters
  - name: SegmentExpertTalkingHeadAudio
    description: Expert speech audio for segment and expert combinations that are used.
    type: multiDimArray
    itemType: audio
  - name: SegmentExpertTalkingHeadVideos
    description: Lip-synced expert talking-head videos for segment and expert combinations that are used.
    type: multiDimArray
    itemType: video

loops:
  - name: segment
    description: Iterates over documentary segments.
    countInput: NumOfSegments
  - name: image
    description: Iterates over still-image assets within a segment.
    parent: segment
    countInput: NumOfImagesPerSegment
  - name: expert
    description: Iterates over recurring documentary experts.
    countInput: NumOfExperts
  - name: historicalcharacter
    description: Iterates over recurring historical characters.
    countInput: NumOfHistoricalCharacters

conditions:
  hasMap:
    when: PlanDirector.AssetPlan.Segments[segment].HasMap
    is: true
  imageUsesHistoricalReference:
    when: PlanDirector.AssetPlan.Segments[segment].ImagePlans[image].UseHistoricalReference
    is: true
  imageUsesPlainGeneration:
    when: PlanDirector.AssetPlan.Segments[segment].ImagePlans[image].UseHistoricalReference
    is: false
  imageUsesPlainGenerationOrStartEndAnchor:
    any:
      - when: PlanDirector.AssetPlan.Segments[segment].ImagePlans[image].UseHistoricalReference
        is: false
      - when: PlanDirector.AssetPlan.Segments[segment].MotionPlan.Workflow
        is: StartEnd
  imageReferencesHistoricalCharacter:
    all:
      - when: PlanDirector.AssetPlan.Segments[segment].ImagePlans[image].UseHistoricalReference
        is: true
      - when: PlanDirector.AssetPlan.Segments[segment].ImagePlans[image].HistoricalCharacterReferences[historicalcharacter].UseReference
        is: true
  motionEnabled:
    when: PlanDirector.AssetPlan.Segments[segment].MotionPlan.Enabled
    is: true
  motionIsText:
    when: PlanDirector.AssetPlan.Segments[segment].MotionPlan.Workflow
    is: Text
  motionIsReference:
    when: PlanDirector.AssetPlan.Segments[segment].MotionPlan.Workflow
    is: Reference
  motionIsStartEnd:
    when: PlanDirector.AssetPlan.Segments[segment].MotionPlan.Workflow
    is: StartEnd
  motionIsStartEndWithPlainAnchors:
    all:
      - when: PlanDirector.AssetPlan.Segments[segment].MotionPlan.Workflow
        is: StartEnd
      - when: PlanDirector.AssetPlan.Segments[segment].ImagePlans[0].UseHistoricalReference
        is: false
      - when: PlanDirector.AssetPlan.Segments[segment].ImagePlans[1].UseHistoricalReference
        is: false
  motionIsMultiShot:
    when: PlanDirector.AssetPlan.Segments[segment].MotionPlan.Workflow
    is: MultiShot
  motionUsesNativeAudio:
    when: PlanDirector.AssetPlan.Segments[segment].MotionPlan.UseNativeAudio
    is: true
  motionReferencesHistoricalCharacter:
    all:
      - when: PlanDirector.AssetPlan.Segments[segment].MotionPlan.Workflow
        is: Reference
      - when: PlanDirector.AssetPlan.Segments[segment].MotionPlan.HistoricalCharacterReferences[historicalcharacter].UseReference
        is: true
  hasExpertTalkingHead:
    when: PlanDirector.AssetPlan.Segments[segment].ExpertTalkingHeads[expert].UseThisExpert
    is: true

imports:
  - name: ExpertCastingDirector
    path: ./planning/expert-casting-director/producer.yaml
  - name: HistoricalCharacterDirector
    path: ./planning/historical-character-director/producer.yaml
  - name: PlanDirector
    path: ./planning/documentary-plan-director/producer.yaml
  - name: NarrationAudioProducer
    producer: audio/text-to-speech
    loop: segment
  - name: SegmentPlainImageProducer
    producer: image/text-to-image
    loop: segment.image
  - name: SegmentReferenceImageProducer
    producer: image/image-compose
    loop: segment.image.historicalcharacter
  - name: HistoricalReferenceStillPromptProducer
    path: ./stills/historical-reference-still-prompt-producer/producer.yaml
    loop: segment.image.historicalcharacter
  - name: MapImageProducer
    producer: image/text-to-image
    loop: segment
  - name: SeedanceVideoGenerator
    producer: video/seedance-video-generator
    loop: segment
  - name: ExpertPortraitProducer
    producer: image/text-to-image
    loop: expert
  - name: HistoricalCharacterAssetsProducer
    path: ./characters/historical-character-assets.yaml
    loop: historicalcharacter
  - name: ExpertTalkingHeadAudioProducer
    producer: audio/text-to-speech
    loop: segment.expert
  - name: ExpertTalkingHeadVideoProducer
    producer: video/talking-head
    loop: segment.expert

connections:
  - from: InquiryPrompt
    to: ExpertCastingDirector.InquiryPrompt
  - from: Duration
    to: ExpertCastingDirector.Duration
  - from: NumOfSegments
    to: ExpertCastingDirector.NumOfSegments
  - from: NumOfExperts
    to: ExpertCastingDirector.NumOfExperts
  - from: Style
    to: ExpertCastingDirector.Style
  - from: Audience
    to: ExpertCastingDirector.Audience
  - from: ExpertEnvironment
    to: ExpertCastingDirector.ExpertEnvironment

  - from: InquiryPrompt
    to: HistoricalCharacterDirector.InquiryPrompt
  - from: NumOfHistoricalCharacters
    to: HistoricalCharacterDirector.NumOfHistoricalCharacters
  - from: Style
    to: HistoricalCharacterDirector.Style
  - from: Audience
    to: HistoricalCharacterDirector.Audience

  - from: InquiryPrompt
    to: PlanDirector.InquiryPrompt
  - from: Duration
    to: PlanDirector.Duration
  - from: NumOfSegments
    to: PlanDirector.NumOfSegments
  - from: NumOfImagesPerSegment
    to: PlanDirector.NumOfImagesPerSegment
  - from: NumOfExperts
    to: PlanDirector.NumOfExperts
  - from: NumOfHistoricalCharacters
    to: PlanDirector.NumOfHistoricalCharacters
  - from: SegmentDuration
    to: PlanDirector.SegmentDuration
  - from: Style
    to: PlanDirector.Style
  - from: Audience
    to: PlanDirector.Audience
  - from: LanguageCode
    to: PlanDirector.LanguageCode
  - from: ExpertEnvironment
    to: PlanDirector.ExpertEnvironment
  - from: ExpertCastingDirector.ExpertSet
    to: PlanDirector.ExpertSet
  - from: HistoricalCharacterDirector.HistoricalCharacterSet
    to: PlanDirector.HistoricalCharacterSet

  - from: PlanDirector.AssetPlan
    to: AssetPlan
  - from: ExpertCastingDirector.ExpertSet
    to: ExpertSet
  - from: HistoricalCharacterDirector.HistoricalCharacterSet
    to: HistoricalCharacterSet
  - from: PlanDirector.AssetPlan.ScenePlanMarkdown
    to: ScenePlanMarkdown

  - from: ExpertCastingDirector.ExpertSet.Experts[expert].PortraitPrompt
    to: ExpertPortraitProducer[expert].Prompt
  - from: Resolution
    to: ExpertPortraitProducer[expert].Resolution
  - from: ExpertPortraitProducer[expert].GeneratedImage
    to: ExpertPortraits[expert]

  - from: HistoricalCharacterDirector.HistoricalCharacterSet.HistoricalCharacters[historicalcharacter].CharacterSheetPrompt
    to: HistoricalCharacterAssetsProducer[historicalcharacter].CharacterSheetPrompt
  - from: Resolution
    to: HistoricalCharacterAssetsProducer[historicalcharacter].Resolution
  - from: HistoricalCharacterDirector.HistoricalCharacterSet.HistoricalCharacters[historicalcharacter].PortraitPrompt
    to: HistoricalCharacterAssetsProducer[historicalcharacter].PortraitPrompt
  - from: HistoricalCharacterAssetsProducer[historicalcharacter].CharacterSheet
    to: HistoricalCharacterSheets[historicalcharacter]
  - from: HistoricalCharacterAssetsProducer[historicalcharacter].Portrait
    to: HistoricalPortraits[historicalcharacter]

  - from: PlanDirector.AssetPlan.Segments[segment].NarrationScript
    to: NarrationAudioProducer[segment].Text
  - from: ExpertCastingDirector.ExpertSet.NarratorVoiceId
    to: NarrationAudioProducer[segment].VoiceId
  - from: LanguageCode
    to: NarrationAudioProducer[segment].LanguageCode
  - from: SegmentDuration
    to: NarrationAudioProducer[segment].Duration
  - from: NarrationAudioProducer[segment].GeneratedAudio
    to: SegmentNarrationAudio[segment]

  - from: PlanDirector.AssetPlan.Segments[segment].ImagePlans[image].Prompt
    to: SegmentPlainImageProducer[segment][image].Prompt
    if: imageUsesPlainGenerationOrStartEndAnchor
  - from: Resolution
    to: SegmentPlainImageProducer[segment][image].Resolution
    if: imageUsesPlainGenerationOrStartEndAnchor
  - from: SegmentPlainImageProducer[segment][image].GeneratedImage
    to: SegmentStillImages[segment][image]
    if: imageUsesPlainGenerationOrStartEndAnchor

  - from: PlanDirector.AssetPlan.Segments[segment].ImagePlans[image].Prompt
    to: HistoricalReferenceStillPromptProducer[segment][image][historicalcharacter].BasePrompt
    if: imageReferencesHistoricalCharacter
  - from: HistoricalCharacterDirector.HistoricalCharacterSet.HistoricalCharacters[historicalcharacter].DisplayName
    to: HistoricalReferenceStillPromptProducer[segment][image][historicalcharacter].ReferenceCharacterName
    if: imageReferencesHistoricalCharacter
  - from: HistoricalReferenceStillPromptProducer[segment][image][historicalcharacter].Prompt
    to: SegmentReferenceImageProducer[segment][image][historicalcharacter].Prompt
    if: imageReferencesHistoricalCharacter
  - from: HistoricalCharacterAssetsProducer[historicalcharacter].Portrait
    to: SegmentReferenceImageProducer[segment][image][historicalcharacter].SourceImages[0]
    if: imageReferencesHistoricalCharacter
  - from: HistoricalCharacterAssetsProducer[historicalcharacter].CharacterSheet
    to: SegmentReferenceImageProducer[segment][image][historicalcharacter].SourceImages[1]
    if: imageReferencesHistoricalCharacter
  - from: Resolution
    to: SegmentReferenceImageProducer[segment][image][historicalcharacter].Resolution
    if: imageReferencesHistoricalCharacter
  - from: SegmentReferenceImageProducer[segment][image][historicalcharacter].ComposedImage
    to: SegmentReferenceStillImages[segment][image][historicalcharacter]
    if: imageReferencesHistoricalCharacter

  - from: PlanDirector.AssetPlan.Segments[segment].MapPrompt
    to: MapImageProducer[segment].Prompt
    if: hasMap
  - from: Resolution
    to: MapImageProducer[segment].Resolution
    if: hasMap
  - from: MapImageProducer[segment].GeneratedImage
    to: SegmentMapImages[segment]
    if: hasMap

  - from: PlanDirector.AssetPlan.Segments[segment].MotionPlan.Workflow
    to: SeedanceVideoGenerator[segment].Workflow
  - from: PlanDirector.AssetPlan.Segments[segment].MotionPlan.SubjectAndAction
    to: SeedanceVideoGenerator[segment].SceneIntent
  - from: PlanDirector.AssetPlan.Segments[segment].MotionPlan.CameraIntent
    to: SeedanceVideoGenerator[segment].CameraIntent
  - from: PlanDirector.AssetPlan.Segments[segment].MotionPlan.AudioIntent
    to: SeedanceVideoGenerator[segment].AudioIntent
  - from: PlanDirector.AssetPlan.Segments[segment].MotionPlan.EnvironmentAndStyle
    to: SeedanceVideoGenerator[segment].EnvironmentAndStyle
  - from: PlanDirector.AssetPlan.Segments[segment].MotionPlan.EndingState
    to: SeedanceVideoGenerator[segment].EndFrameDescription
  - from: PlanDirector.AssetPlan.Segments[segment].MotionPlan.ShotBreakdown
    to: SeedanceVideoGenerator[segment].ShotBreakdown
  - from: PlanDirector.AssetPlan.Segments[segment].MotionPlan.ReferenceSubjectLabel
    to: SeedanceVideoGenerator[segment].ReferenceMediaInstructions
  - from: PlanDirector.AssetPlan.Segments[segment].MotionPlan.UseNativeAudio
    to: SeedanceVideoGenerator[segment].UseNativeAudio
  - from: PlanDirector.AssetPlan.Segments[segment].MotionPlan.StartEndAnchorsArePlain
    to: SeedanceVideoGenerator[segment].StartEndAnchorsArePlain
  - from: SegmentDuration
    to: SeedanceVideoGenerator[segment].Duration
  - from: Resolution
    to: SeedanceVideoGenerator[segment].Resolution
  - from: SegmentPlainImageProducer[segment][0].GeneratedImage
    to: SeedanceVideoGenerator[segment].StartImage
    if: motionIsStartEnd
  - from: SegmentPlainImageProducer[segment][1].GeneratedImage
    to: SeedanceVideoGenerator[segment].EndImage
    if: motionIsStartEnd
  - from: HistoricalCharacterAssetsProducer[historicalcharacter].Portrait
    to: SeedanceVideoGenerator[segment].ReferenceImage1
    if: motionReferencesHistoricalCharacter
  - from: HistoricalCharacterAssetsProducer[historicalcharacter].CharacterSheet
    to: SeedanceVideoGenerator[segment].ReferenceImage2
    if: motionReferencesHistoricalCharacter
  - from: SeedanceVideoGenerator[segment].GeneratedVideo
    to: SegmentMotionVideos[segment]
  - from: PlanDirector.AssetPlan.Segments[segment].MotionPlan.HistoricalCharacterReferences[historicalcharacter].UseReference
    to: SegmentMotionHistoricalCharacterReferences[segment][historicalcharacter]

  - from: PlanDirector.AssetPlan.Segments[segment].ExpertTalkingHeads[expert].TalkingHeadText
    to: ExpertTalkingHeadAudioProducer[segment][expert].Text
    if: hasExpertTalkingHead
  - from: ExpertCastingDirector.ExpertSet.Experts[expert].VoiceId
    to: ExpertTalkingHeadAudioProducer[segment][expert].VoiceId
    if: hasExpertTalkingHead
  - from: LanguageCode
    to: ExpertTalkingHeadAudioProducer[segment][expert].LanguageCode
    if: hasExpertTalkingHead
  - from: SegmentDuration
    to: ExpertTalkingHeadAudioProducer[segment][expert].Duration
    if: hasExpertTalkingHead
  - from: ExpertTalkingHeadAudioProducer[segment][expert].GeneratedAudio
    to: SegmentExpertTalkingHeadAudio[segment][expert]
    if: hasExpertTalkingHead

  - from: PlanDirector.AssetPlan.Segments[segment].ExpertTalkingHeads[expert].TalkingHeadPrompt
    to: ExpertTalkingHeadVideoProducer[segment][expert].Prompt
    if: hasExpertTalkingHead
  - from: ExpertPortraitProducer[expert].GeneratedImage
    to: ExpertTalkingHeadVideoProducer[segment][expert].CharacterImage
    if: hasExpertTalkingHead
  - from: ExpertTalkingHeadAudioProducer[segment][expert].GeneratedAudio
    to: ExpertTalkingHeadVideoProducer[segment][expert].AudioUrl
    if: hasExpertTalkingHead
  - from: SegmentDuration
    to: ExpertTalkingHeadVideoProducer[segment][expert].Duration
    if: hasExpertTalkingHead
  - from: Resolution
    to: ExpertTalkingHeadVideoProducer[segment][expert].Resolution
    if: hasExpertTalkingHead
  - from: ExpertTalkingHeadVideoProducer[segment][expert].GeneratedVideo
    to: SegmentExpertTalkingHeadVideos[segment][expert]
    if: hasExpertTalkingHead
