- Number of recurring experts: {{NumOfExperts}}
- Number of recurring historical characters: {{NumOfHistoricalCharacters}}
- Shared visual style: {{Style}}
- Target audience: {{Audience}}
- Language code: {{LanguageCode}}
- Expert interview environment: {{ExpertEnvironment}}

Pre-cast expert set:
{{ExpertSet}}

Pre-designed historical character references:
{{HistoricalCharacterSet}}
