meta:
  name: Historical Documentary Asset Planner
  description: Plans narration, stills, maps, Seedance-oriented motion intent, expert usage, and scene-order markdown for a topic-generic historical documentary asset pipeline.
  id: DocumentaryPlanDirector
  kind: producer
  version: 0.1.0
  author: Renku
  license: MIT
  promptFile: ./prompts.toml
  outputSchema: ./output-schema.json

inputs:
  - name: InquiryPrompt
    description: Documentary topic or guiding question.
    type: string
  - name: Duration
    description: Total documentary runtime in seconds.
    type: int
  - name: NumOfClips
    description: Number of planned documentary clips.
    type: int
  - name: NumOfImagesPerClip
    description: Number of still-image assets per clip.
    type: int
  - name: NumOfExperts
    description: Number of recurring experts available.
    type: int
  - name: NumOfHistoricalCharacters
    description: Number of recurring historical characters available for reference bundles.
    type: int
  - name: ClipDuration
    description: Derived runtime budget per clip in seconds.
    type: int
  - name: Style
    description: Shared visual style direction.
    type: string
  - name: Audience
    description: Target audience for tone and depth.
    type: string
  - name: LanguageCode
    description: ISO language code for narration and expert speech.
    type: string
  - name: ExpertEnvironment
    description: Shared interview environment for expert talking heads.
    type: string
  - name: ExpertSet
    description: Structured expert metadata produced upstream.
    type: json
  - name: HistoricalCharacterSet
    description: Structured historical character metadata produced upstream.
    type: json

outputs:
  - name: AssetPlan
    description: Structured historical documentary asset plan.
    type: json
    arrays:
      - path: Clips
        countInput: NumOfClips
      - path: Clips.ImagePlans
        countInput: NumOfImagesPerClip
      - path: Clips.ImagePlans.HistoricalCharacterReferences
        countInput: NumOfHistoricalCharacters
      - path: Clips.ExpertTalkingHeads
        countInput: NumOfExperts
      - path: Clips.MotionPlan.HistoricalCharacterReferences
        countInput: NumOfHistoricalCharacters

loops:
  - name: clip
    description: Iterates over documentary clips.
    countInput: NumOfClips
  - name: image
    description: Iterates over still-image assets within a clip.
    parent: clip
    countInput: NumOfImagesPerClip
  - name: expert
    description: Iterates over recurring experts.
    countInput: NumOfExperts
  - name: historicalcharacter
    description: Iterates over recurring historical characters.
    countInput: NumOfHistoricalCharacters
