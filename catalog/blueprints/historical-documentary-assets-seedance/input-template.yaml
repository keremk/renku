inputs:
  InquiryPrompt: 'Create a historical documentary asset package about the fall of Constantinople, focusing on the military buildup, the siege, the political stakes, and the long-term consequences.'
  Duration: 72
  NumOfSegments: 6
  NumOfImagesPerSegment: 2
  NumOfExperts: 2
  NumOfHistoricalCharacters: 3
  Style: 'cinematic historical documentary, realistic, richly textured, atmospheric, grounded lighting'
  Audience: 'curious general audience interested in serious but accessible history'
  LanguageCode: en
  ExpertEnvironment: 'a thoughtful documentary interview setting with dark wood shelves, archival maps, warm key light, and subtle historical objects in the background'
  Resolution:
    width: 1280
    height: 720

