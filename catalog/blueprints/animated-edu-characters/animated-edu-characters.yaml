meta:
  name: Animated Educational Characters
  description: Generate fun educational videos with cute Pixar-style animated characters that are lipsynced to narration.
  id: AnimatedEduCharacters
  version: 0.1.0
  author: User
  license: MIT

inputs:
  - name: Duration
    description: Total video duration in seconds.
    type: int
    required: true
  - name: NumOfClips
    description: Number of character clips to produce.
    type: int
    required: true
  - name: EducationalTopic
    description: The educational topic to teach (e.g., "the vital organs of the human body").
    type: text
    required: true
  - name: TargetAudience
    description: Target audience for the content (e.g., "children ages 6-10").
    type: string
    required: true
  - name: AnimationStyle
    description: Animation style description (e.g., "Pixar-style 3D animated, cute, colorful").
    type: text
    required: true
  - name: VoiceId
    description: Voice identifier for narration audio.
    type: string
    required: true
  - name: Resolution
    description: Video resolution in pixel dimensions.
    type: resolution

outputs:
  - name: CharacterImage
    description: Generated character images for each clip.
    type: array
    itemType: image
    countInput: NumOfClips
  - name: NarrationAudio
    description: Generated narration audio for each clip.
    type: array
    itemType: audio
    countInput: NumOfClips
  - name: LipsyncVideo
    description: Generated lipsynced character videos for each clip.
    type: array
    itemType: video
    countInput: NumOfClips
  - name: Timeline
    description: Composed timeline of all video clips.
    type: json
  - name: Transcription
    description: Word-level transcription for karaoke subtitles.
    type: json
  - name: FinalVideo
    description: Final rendered video with karaoke subtitles.
    type: video

loops:
  - name: clip
    description: Iterates over character clips.
    countInput: NumOfClips

imports:
  # Script and character generation
  - name: EduScriptProducer
    path: ./edu-script/edu-script.yaml

  # Character image generation (one per clip)
  - name: CharacterImageProducer
    producer: image/text-to-image
    loop: clip

  # Narration audio generation (one per clip)
  - name: NarrationAudioProducer
    producer: audio/text-to-speech
    loop: clip

  # Lipsync video generation (character + audio = talking video)
  - name: LipsyncVideoProducer
    producer: video/talking-head
    loop: clip

  # Timeline composition
  - name: TimelineComposer
    producer: composition/timeline-composer

  # Transcription for karaoke subtitles
  - name: TranscriptionProducer
    producer: json/transcription

  # Final video export
  - name: VideoExporter
    producer: composition/video-exporter

connections:
  # ============================================================
  # Wire inputs to EduScriptProducer
  # ============================================================
  - from: EducationalTopic
    to: EduScriptProducer.EducationalTopic
  - from: Duration
    to: EduScriptProducer.Duration
  - from: NumOfClips
    to: EduScriptProducer.NumOfClips
  - from: ClipDuration
    to: EduScriptProducer.ClipDuration
  - from: TargetAudience
    to: EduScriptProducer.TargetAudience
  - from: AnimationStyle
    to: EduScriptProducer.AnimationStyle

  # ============================================================
  # Wire script outputs to CharacterImageProducer
  # ============================================================
  - from: EduScriptProducer.VideoScript.Characters[clip].CharacterImagePrompt
    to: CharacterImageProducer[clip].Prompt
  - from: Resolution
    to: CharacterImageProducer[clip].Resolution
  - from: CharacterImageProducer[clip].GeneratedImage
    to: CharacterImage[clip]

  # ============================================================
  # Wire script outputs to NarrationAudioProducer
  # ============================================================
  - from: EduScriptProducer.VideoScript.Characters[clip].NarrationScript
    to: NarrationAudioProducer[clip].Text
  - from: ClipDuration
    to: NarrationAudioProducer[clip].Duration
  - from: VoiceId
    to: NarrationAudioProducer[clip].VoiceId
  - from: NarrationAudioProducer[clip].GeneratedAudio
    to: NarrationAudio[clip]

  # ============================================================
  # Wire character images and audio to LipsyncVideoProducer
  # ============================================================
  - from: CharacterImageProducer[clip].GeneratedImage
    to: LipsyncVideoProducer[clip].CharacterImage
  - from: NarrationAudioProducer[clip].GeneratedAudio
    to: LipsyncVideoProducer[clip].AudioUrl
  - from: Resolution
    to: LipsyncVideoProducer[clip].Resolution
  - from: ClipDuration
    to: LipsyncVideoProducer[clip].Duration
  - from: EduScriptProducer.VideoScript.Characters[clip].VideoPrompt
    to: LipsyncVideoProducer[clip].Prompt
  - from: LipsyncVideoProducer[clip].GeneratedVideo
    to: LipsyncVideo[clip]

  # ============================================================
  # Wire videos to TimelineComposer (video already contains audio)
  # ============================================================
  - from: LipsyncVideoProducer[clip].GeneratedVideo
    to: TimelineComposer.VideoClips
  - from: Duration
    to: TimelineComposer.Duration
  - from: TimelineComposer.Timeline
    to: Timeline

  # ============================================================
  # Wire audio to TimelineComposer for Transcription track
  # Use AudioTrack from LipsyncVideoProducer (extracted from generated video)
  # ============================================================
  - from: LipsyncVideoProducer[clip].AudioTrack
    to: TimelineComposer.TranscriptionAudio

  # ============================================================
  # Wire to TranscriptionProducer for karaoke subtitles
  # ============================================================
  - from: TimelineComposer.Timeline
    to: TranscriptionProducer.Timeline
  - from: TranscriptionProducer.Transcription
    to: Transcription

  # ============================================================
  # Wire to VideoExporter for final output
  # ============================================================
  - from: TimelineComposer.Timeline
    to: VideoExporter.Timeline
  - from: Duration
    to: VideoExporter.Duration
  - from: TranscriptionProducer.Transcription
    to: VideoExporter.Transcription
  - from: VideoExporter.FinalVideo
    to: FinalVideo
