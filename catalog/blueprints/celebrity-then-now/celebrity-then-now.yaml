meta:
  name: Celebrity Then and Now
  description: Generate a video showcasing celebrities' transformations over time. Each celebrity clip is built by a local composite producer that creates a meeting clip, a seamless camera move back to an empty scene, and stitches them into one clip video before timeline composition.
  id: CelebrityThenNow
  kind: blueprint
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  # User-provided images
  - name: CelebrityThenImages
    description: Array of celebrity "then" (young/early career) images - one per celebrity, matching order.
    type: array
    itemType: image
    required: true
  - name: CelebrityNowImages
    description: Array of celebrity "now" (current) images - one per celebrity, matching order with ThenImages.
    type: array
    itemType: image
    required: true
  - name: SettingImage
    description: Single background/setting image that establishes the environment for all clips (e.g., a movie set, iconic location).
    type: image
    required: true

  # Creative inputs
  - name: Theme
    description: The overall theme or concept for the celebrity retrospective (e.g., "Hollywood Icons Through Time").
    type: string
    required: true
  - name: EnvironmentDescription
    description: Description of the environment suggested by the setting image (e.g., "a vintage Hollywood movie set with golden lighting").
    type: string
    required: true
  - name: VisualStyle
    description: Visual style for the video (e.g., cinematic, nostalgic, documentary).
    type: string
    required: true
  - name: MusicalStyle
    description: Style guidance for the background music (e.g., nostalgic orchestral, soft piano, retro jazz).
    type: string
    required: false

  # Timing
  - name: NumOfClips
    description: Number of celebrity clips in the video. Must match the length of CelebrityThenImages and CelebrityNowImages.
    type: int
    required: true
  - name: MeetingDuration
    description: Duration of each meeting clip in seconds (recommended 10).
    type: int
    required: true
  - name: TransitionDuration
    description: Duration of each transition clip in seconds (recommended 5).
    type: int
    required: true
  - name: Duration
    description: Total duration of the final video in seconds.
    type: int
    required: true

  # Video settings
  - name: Resolution
    description: Video resolution as width/height pixel dimensions.
    type: resolution
    required: true

outputs:
  - name: ConsistentThenImages
    description: Generated consistent "then" images of celebrities placed in the setting.
    type: array
    itemType: image
    countInput: NumOfClips
  - name: ConsistentNowImages
    description: Generated consistent "now" images of celebrities placed in the setting.
    type: array
    itemType: image
    countInput: NumOfClips
  - name: CelebrityVideos
    description: Stitched celebrity clip videos. Each clip shows the then self entering the empty scene, meeting the current self, and transitioning back to an empty scene.
    type: array
    itemType: video
    countInput: NumOfClips
  - name: Music
    description: Generated background music for the entire video.
    type: audio
  - name: Timeline
    description: Composed timeline JSON manifest.
    type: json
  - name: FinalVideo
    description: Final rendered video with all clips and music.
    type: video

loops:
  - name: clip
    description: Iterates over celebrity clips.
    countInput: NumOfClips

imports:
  # Script/prompt generation
  - name: DirectorProducer
    path: ./director/director.yaml

  # Image composition - create consistent images from user photos
  - name: ThenImageProducer
    producer: image/image-compose
    loop: clip
  - name: NowImageProducer
    producer: image/image-compose
    loop: clip

  # Per-celebrity composite clip builder
  - name: CelebrityVideoProducer
    path: ./celebrity-video/celebrity-video.yaml
    loop: clip

  # Music
  - name: MusicProducer
    producer: audio/text-to-music

  # Composition
  - name: TimelineComposer
    producer: composition/timeline-composer
  - name: VideoExporter
    producer: composition/video-exporter

connections:
  # === DirectorProducer inputs ===
  - from: Theme
    to: DirectorProducer.Theme
  - from: EnvironmentDescription
    to: DirectorProducer.EnvironmentDescription
  - from: VisualStyle
    to: DirectorProducer.VisualStyle
  - from: NumOfClips
    to: DirectorProducer.NumOfClips
  - from: MeetingDuration
    to: DirectorProducer.MeetingDuration
  - from: TransitionDuration
    to: DirectorProducer.TransitionDuration
  - from: Duration
    to: DirectorProducer.Duration
  - from: MusicalStyle
    to: DirectorProducer.MusicalStyle

  # === ThenImageProducer inputs (looped over clip) ===
  - from: CelebrityThenImages[clip]
    to: ThenImageProducer[clip].SourceImages[0]
    note: User-provided young/then photo for this character
  - from: SettingImage
    to: ThenImageProducer[clip].SourceImages[1]
    note: Setting image for visual context
  - from: DirectorProducer.Script.Characters[clip].ThenImagePrompt
    to: ThenImageProducer[clip].Prompt
  - from: Resolution
    to: ThenImageProducer[clip].Resolution

  # === ThenImageProducer outputs ===
  - from: ThenImageProducer[clip].ComposedImage
    to: ConsistentThenImages[clip]

  # === NowImageProducer inputs (looped over clip) ===
  - from: CelebrityNowImages[clip]
    to: NowImageProducer[clip].SourceImages[0]
    note: User-provided current/now photo for this character
  - from: SettingImage
    to: NowImageProducer[clip].SourceImages[1]
    note: Setting image for visual context
  - from: DirectorProducer.Script.Characters[clip].NowImagePrompt
    to: NowImageProducer[clip].Prompt
  - from: Resolution
    to: NowImageProducer[clip].Resolution

  # === NowImageProducer outputs ===
  - from: NowImageProducer[clip].ComposedImage
    to: ConsistentNowImages[clip]

  # === CelebrityVideoProducer inputs (looped over clip) ===
  - from: ThenImageProducer[clip].ComposedImage
    to: CelebrityVideoProducer[clip].CelebrityThenImage
    note: Consistent then image in the shared environment
  - from: NowImageProducer[clip].ComposedImage
    to: CelebrityVideoProducer[clip].CelebrityNowImage
    note: Consistent now image in the shared environment
  - from: SettingImage
    to: CelebrityVideoProducer[clip].SettingImage
    note: Empty setting used for seamless clip starts and exits
  - from: DirectorProducer.Script.Characters[clip].TogetherImagePrompt
    to: CelebrityVideoProducer[clip].TogetherImagePrompt
  - from: DirectorProducer.Script.Characters[clip].MeetingVideoPrompt
    to: CelebrityVideoProducer[clip].MeetingVideoPrompt
  - from: DirectorProducer.Script.Characters[clip].TransitionVideoPrompt
    to: CelebrityVideoProducer[clip].TransitionVideoPrompt
  - from: MeetingDuration
    to: CelebrityVideoProducer[clip].MeetingDuration
  - from: TransitionDuration
    to: CelebrityVideoProducer[clip].TransitionDuration
  - from: ClipDuration
    to: CelebrityVideoProducer[clip].Duration
  - from: Resolution
    to: CelebrityVideoProducer[clip].Resolution

  # === CelebrityVideoProducer outputs ===
  - from: CelebrityVideoProducer[clip].CelebrityVideo
    to: CelebrityVideos[clip]

  # === MusicProducer inputs ===
  - from: DirectorProducer.Script.MusicPrompt
    to: MusicProducer.Prompt
  - from: Duration
    to: MusicProducer.Duration

  # === MusicProducer outputs ===
  - from: MusicProducer.GeneratedMusic
    to: Music

  # === TimelineComposer inputs ===
  - from: Duration
    to: TimelineComposer.Duration
  - from: CelebrityVideoProducer[clip].CelebrityVideo
    to: TimelineComposer.VideoClips
  - from: MusicProducer.GeneratedMusic
    to: TimelineComposer.Music

  # === TimelineComposer outputs ===
  - from: TimelineComposer.Timeline
    to: Timeline

  # === VideoExporter inputs ===
  - from: TimelineComposer.Timeline
    to: VideoExporter.Timeline
  - from: Duration
    to: VideoExporter.Duration

  # === VideoExporter outputs ===
  - from: VideoExporter.FinalVideo
    to: FinalVideo
