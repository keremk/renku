meta:
  name: Historical Ken Burns Documentary V2
  description: A Ken Burns-style documentary blueprint optimized for historical narratives. Features narrated image clips with conditional text overlays for dates, locations, and historical figures, plus conditional map images for geographic context. Includes background music and the new composed subtitles pipeline for karaoke subtitles.
  id: HistoricalDocumentaryV2
  kind: blueprint
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: Duration
    description: Total video duration in seconds.
    type: int
    required: true
  - name: NumOfClips
    description: Number of narrative clips.
    type: int
    required: true
  - name: InquiryPrompt
    description: The historical topic or narrative to explore (e.g., "The fall of the Roman Empire", "The Silk Road trade routes").
    type: string
    required: true
  - name: NumOfImagesPerClip
    description: Number of images to generate per narrative clip.
    type: int
    required: false
  - name: Style
    description: Visual style for image generation (e.g., "Oil painting, Renaissance style", "Photorealistic historical recreation").
    type: string
    required: true
  - name: Resolution
    description: Image and video resolution as width/height pixel dimensions.
    type: resolution
    required: false
  - name: Audience
    description: Target audience (e.g., adults, students, history enthusiasts).
    type: string
    required: false
  - name: Language
    description: Narration language (e.g., en, es, fr).
    type: string
    required: false
  - name: VoiceId
    description: Voice identifier for narration audio.
    type: string
    required: true

outputs:
  - name: ClipImage
    description: Ken Burns style images per clip.
    type: multiDimArray
    itemType: image
  - name: ClipAudio
    description: Narration audio per clip.
    type: array
    itemType: audio
  - name: Music
    description: Background music for the documentary.
    type: audio
  - name: Timeline
    description: Composed timeline JSON manifest.
    type: json
  - name: FinalVideo
    description: Final rendered MP4 with karaoke subtitles.
    type: video

loops:
  - name: clip
    description: Iterates over narrative clips.
    countInput: NumOfClips
  - name: image
    description: Iterates over images per clip.
    parent: clip
    countInput: NumOfImagesPerClip

conditions:
  hasTextOverlay:
    when: HistoricalScriptProducer.VideoScript.Clips[clip].HasTextOverlay
    is: true

imports:
  - name: HistoricalScriptProducer
    path: ./historical-script/historical-script.yaml
  - name: ImageProducer
    producer: image/text-to-image
    loop: clip.image
  - name: AudioProducer
    producer: audio/text-to-speech
    loop: clip
  - name: MusicProducer
    producer: audio/text-to-music
  - name: TimelineComposer
    producer: composition/timeline-composer
  - name: SubtitlesProducer
    producer: composition/subtitles
  - name: VideoExporter
    producer: composition/video-exporter

connections:
  # --- Wire inputs to HistoricalScriptProducer ---
  - from: InquiryPrompt
    to: HistoricalScriptProducer.InquiryPrompt
  - from: Duration
    to: HistoricalScriptProducer.Duration
  - from: NumOfClips
    to: HistoricalScriptProducer.NumOfClips
  - from: NumOfImagesPerClip
    to: HistoricalScriptProducer.NumOfImagesPerClip
  - from: ClipDuration
    to: HistoricalScriptProducer.ClipDuration
  - from: Style
    to: HistoricalScriptProducer.Style
  - from: Audience
    to: HistoricalScriptProducer.Audience
  - from: Language
    to: HistoricalScriptProducer.Language

  # --- Image generation ---
  - from: HistoricalScriptProducer.VideoScript.Clips[clip].ImagePrompts[image]
    to: ImageProducer[clip][image].Prompt
  - from: Resolution
    to: ImageProducer[clip][image].Resolution
  - from: ImageProducer[clip][image].GeneratedImage
    to: ClipImage[clip][image]
  - from: ImageProducer[clip][image].GeneratedImage
    to: TimelineComposer.ImageClips
    groupBy: clip
    orderBy: image

  # --- Audio narration ---
  - from: HistoricalScriptProducer.VideoScript.Clips[clip].NarrationScript
    to: AudioProducer[clip].Text
  - from: ClipDuration
    to: AudioProducer[clip].Duration
  - from: VoiceId
    to: AudioProducer[clip].VoiceId
  - from: AudioProducer[clip].GeneratedAudio
    to: ClipAudio[clip]
  - from: AudioProducer[clip].GeneratedAudio
    to: TimelineComposer.AudioClips

  # --- Text overlay (conditional) ---
  - from: HistoricalScriptProducer.VideoScript.Clips[clip].TextOverlay
    to: TimelineComposer.TextClips
    if: hasTextOverlay

  # --- Background music ---
  - from: HistoricalScriptProducer.VideoScript.MusicPrompt
    to: MusicProducer.Prompt
  - from: Duration
    to: MusicProducer.Duration
  - from: MusicProducer.GeneratedMusic
    to: Music

  # --- Timeline composition ---
  - from: MusicProducer.GeneratedMusic
    to: TimelineComposer.Music
  - from: Duration
    to: TimelineComposer.Duration
  - from: TimelineComposer.Timeline
    to: Timeline

  # --- Transcription (wire audio to transcription track) ---
  - from: AudioProducer[clip].GeneratedAudio
    to: TimelineComposer.TranscriptionAudio

  # --- Subtitles composition ---
  - from: AudioProducer[clip].GeneratedAudio
    to: SubtitlesProducer.TranscriptionAudio[clip]
  - from: TimelineComposer.Timeline
    to: SubtitlesProducer.Timeline
  - from: Language
    to: SubtitlesProducer.LanguageCode
  - from: NumOfClips
    to: SubtitlesProducer.NumOfClips
  - from: Duration
    to: SubtitlesProducer.Duration

  # --- Video export with karaoke subtitles ---
  - from: TimelineComposer.Timeline
    to: VideoExporter.Timeline
  - from: Duration
    to: VideoExporter.Duration
  - from: Resolution
    to: VideoExporter.Resolution
  - from: SubtitlesProducer.Transcription
    to: VideoExporter.Transcription
  - from: VideoExporter.FinalVideo
    to: FinalVideo
