meta:
  name: Video Exporter
  description: Render the composed timeline into a final MP4.
  id: VideoExporter
  kind: producer
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: Timeline
    description: OrderedTimeline JSON manifest to render.
    type: json
  - name: Duration
    description: Total output video duration in seconds.
    type: integer
    required: true
  - name: Transcription
    description: Optional word-level transcription for karaoke subtitles.
    type: json
    required: false
  - name: Resolution
    description: Optional output resolution as pixel dimensions.
    type: resolution
    required: false

outputs:
  - name: FinalVideo
    description: Final rendered MP4 video.
    type: video

# Model mappings for available renderers
mappings:
  renku:
    ffmpeg/native-render:
      Timeline: timeline
      Transcription: transcription
    remotion/docker-render:
      Timeline: timeline
      Transcription: transcription
