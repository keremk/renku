meta:
  name: Subtitles Producer
  description: Generate exporter-ready subtitles by combining per-clip STT with the final timeline timing.
  id: SubtitlesProducer
  kind: blueprint
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: TranscriptionAudio
    description: Narration audio clips grouped per clip for subtitle generation.
    type: array
    itemType: audio
    dimensions: clip
    required: true
  - name: LanguageCode
    description: ISO 639-3 language code for transcription (e.g., eng, spa, fra).
    type: string
    required: true
  - name: Timeline
    description: Timeline document with Transcription track containing audio clip timing information.
    type: json
    required: true
  - name: NumOfClips
    description: Number of narrative clips.
    type: int
    required: true
  - name: Duration
    description: Total duration of the final movie in seconds.
    type: int
    required: true

outputs:
  - name: Transcription
    description: Word-level transcription aligned to the final video timeline.
    type: json

loops:
  - name: clip
    description: Iterates over narrative clips.
    countInput: NumOfClips

conditions:
  hasTranscriptionAudio:
    when: Input:SubtitlesProducer.TranscriptionAudio[clip]
    exists: true

imports:
  - name: STTTimestamps
    producer: json/stt-timestamps
    loop: clip
    if: hasTranscriptionAudio
  - name: STTNormalizer
    producer: composition/stt-normalizer
    loop: clip
    if: hasTranscriptionAudio
  - name: SubtitlesComposer
    producer: composition/subtitles-composer

connections:
  - from: TranscriptionAudio[clip]
    to: STTTimestamps[clip].TranscriptionAudio
  - from: LanguageCode
    to: STTTimestamps[clip].LanguageCode

  - from: STTTimestamps[clip].RawTranscription
    to: STTNormalizer[clip].RawTranscription

  - from: Timeline
    to: SubtitlesComposer.Timeline
  - from: Duration
    to: SubtitlesComposer.Duration
  - from: STTNormalizer[clip].NormalizedTranscript
    to: SubtitlesComposer.Transcripts
    groupBy: clip
    if: hasTranscriptionAudio
  - from: SubtitlesComposer.Transcription
    to: Transcription
