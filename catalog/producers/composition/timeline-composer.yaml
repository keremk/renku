meta:
  name: Timeline Composer
  description: Compose assets into a ReMotion timeline.
  id: TimelineComposer
  kind: producer
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: ImageSegments
    description: Collected image assets grouped per segment.
    type: array
    itemType: image
    dimensions: segment.image
    fanIn: true
    required: false
  - name: VideoSegments
    description: Collected video assets grouped per narration segment.
    type: array
    itemType: video
    dimensions: segment
    fanIn: true
    required: false
  - name: AudioSegments
    description: Narration audio clips grouped per segment (master track).
    type: array
    itemType: audio
    dimensions: segment
    fanIn: true
    required: false
  - name: TranscriptionAudio
    description: Audio clips to transcribe, grouped per segment.
    type: array
    itemType: audio
    dimensions: segment
    fanIn: true
    required: false
  - name: TextSegments
    description: Text snippets grouped per segment.
    type: array
    itemType: string
    dimensions: segment
    fanIn: true
    required: false
  - name: Music
    description: Background music clips that score the movie (looped as needed).
    type: audio
    fanIn: true
    required: false
  - name: Duration
    description: Total duration of the movie in seconds.
    type: int

outputs:
  - name: Timeline
    description: OrderedTimeline JSON manifest.
    type: json

# Model mappings for available timeline composers
mappings:
  renku:
    timeline/ordered:
      ImageSegments:
        field: imageSegments
      VideoSegments:
        field: videoSegments
      AudioSegments:
        field: audioSegments
      TranscriptionAudio:
        field: transcriptionAudio
      TextSegments:
        field: textSegments
      Music:
        field: music
      Duration:
        field: duration
      MovieId:
        field: movieId
      MovieTitle:
        field: movieTitle
      StorageRoot:
        field: storageRoot
      StorageBasePath:
        field: storageBasePath
