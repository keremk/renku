meta:
  name: Timeline Composer
  description: Compose assets into a ReMotion timeline.
  id: TimelineComposer
  kind: producer
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: ImageClips
    description: Collected image assets grouped per clip.
    type: array
    itemType: image
    dimensions: clip.image
    fanIn: true
    required: false
  - name: VideoClips
    description: Collected video assets grouped per narration clip.
    type: array
    itemType: video
    dimensions: clip
    fanIn: true
    required: false
  - name: AudioClips
    description: Narration audio clips grouped per clip (master track).
    type: array
    itemType: audio
    dimensions: clip
    fanIn: true
    required: false
  - name: TranscriptionAudio
    description: Audio clips to transcribe, grouped per clip.
    type: array
    itemType: audio
    dimensions: clip
    fanIn: true
    required: false
  - name: TextClips
    description: Text snippets grouped per clip.
    type: array
    itemType: string
    dimensions: clip
    fanIn: true
    required: false
  - name: Music
    description: Background music clips that score the movie (looped as needed).
    type: audio
    fanIn: true
    required: false
  - name: Duration
    description: Total duration of the movie in seconds.
    type: int

outputs:
  - name: Timeline
    description: OrderedTimeline JSON manifest.
    type: json

# Model mappings for available timeline composers
mappings:
  renku:
    timeline/ordered:
      ImageClips:
        field: imageClips
      VideoClips:
        field: videoClips
      AudioClips:
        field: audioClips
      TranscriptionAudio:
        field: transcriptionAudio
      TextClips:
        field: textClips
      Music:
        field: music
      Duration:
        field: duration
      MovieId:
        field: movieId
      MovieTitle:
        field: movieTitle
      StorageRoot:
        field: storageRoot
      StorageBasePath:
        field: storageBasePath
