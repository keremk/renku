meta:
  name: STT Timestamps
  description: Generate a raw timestamped transcription JSON from a single audio clip.
  id: STTTimestamps
  kind: producer
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: TranscriptionAudio
    description: Audio clip to transcribe.
    type: audio
    required: true
  - name: LanguageCode
    description: ISO 639-3 language code for transcription (e.g., eng, spa, fra).
    type: string
    required: true

outputs:
  - name: RawTranscription
    description: Raw provider STT response with timestamps.
    type: json

mappings:
  fal-ai:
    elevenlabs/speech-to-text:
      TranscriptionAudio: audio_url
      LanguageCode: language_code
