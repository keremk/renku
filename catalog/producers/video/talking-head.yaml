meta:
  name: Talking Head Generator
  description: Generate lip-synced talking-head video from a character image and audio. Use this when you have pre-existing audio and a character/avatar image, and want the character to speak or move in sync with the audio. If you only have text (no audio file), use text-to-talking-head instead.
  id: TalkingHeadProducer
  kind: producer
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: Prompt
    description: Text prompt describing the video action and subject.
    type: string

  # Character
  - name: CharacterImage
    description: Character/avatar image for the talking head.
    type: image

  # Audio
  - name: AudioUrl
    description: URL to audio file for lip-sync.
    type: string

  # Duration
  - name: Duration
    description: Video duration in seconds (converted to frames for some models).
    type: integer

  # Sizing
  - name: Resolution
    description: Output resolution as pixel dimensions.
    type: resolution

artifacts:
  - name: GeneratedVideo
    description: The generated lip-synced video.
    type: video
  - name: FirstFrame
    description: The first frame of the generated video.
    type: image
  - name: LastFrame
    description: The last frame of the generated video.
    type: image
  - name: AudioTrack
    description: The audio track of the generated video.
    type: audio

mappings:
  fal-ai:
    # Creatify Aurora
    creatify/aurora:
      Prompt: prompt
      CharacterImage: image_url
      AudioUrl: audio_url
      Resolution:
        field: resolution
        resolution:
          mode: preset

    # VEED Fabric 1.0 Fast
    veed/fabric-1.0/fast:
      CharacterImage: image_url
      AudioUrl: audio_url
      Resolution:
        field: resolution
        resolution:
          mode: preset

    # InfiniTalk (Audio-driven)
    infinitalk:
      Prompt: prompt
      CharacterImage: image_url
      AudioUrl: audio_url
      Duration:
        field: num_frames
        durationToFrames:
          fps: 24
      Resolution:
        field: resolution
        resolution:
          mode: preset

    # ByteDance OmniHuman v1.5
    bytedance/omnihuman/v1.5:
      Prompt: prompt
      CharacterImage: image_url
      AudioUrl: audio_url
      Resolution:
        field: resolution
        resolution:
          mode: preset

    # Kling AI Avatar v2 Standard
    kling-video/ai-avatar/v2/standard:
      Prompt: prompt
      CharacterImage: image_url
      AudioUrl: audio_url

    # Kling AI Avatar v2 Pro
    kling-video/ai-avatar/v2/pro:
      Prompt: prompt
      CharacterImage: image_url
      AudioUrl: audio_url

    # LTX-2.3 Audio-to-Video
    ltx-2.3/audio-to-video:
      Prompt: prompt
      CharacterImage: image_url
      AudioUrl: audio_url

    # LTX-2-19b Audio-to-Video
    ltx-2-19b/audio-to-video:
      Prompt: prompt
      CharacterImage: image_url
      AudioUrl: audio_url
      Duration:
        field: num_frames
        durationToFrames:
          fps: 25
      Resolution:
        field: video_size
        resolution:
          mode: aspectRatioAndPreset
        transform:
          '16:9+480p': { width: 848, height: 480 }
          '16:9+720p': { width: 1280, height: 720 }
          '16:9+1080p': { width: 1920, height: 1080 }
          '9:16+480p': { width: 480, height: 848 }
          '9:16+720p': { width: 720, height: 1280 }
          '9:16+1080p': { width: 1080, height: 1920 }
          '4:3+480p': { width: 640, height: 480 }
          '4:3+720p': { width: 960, height: 720 }
          '4:3+1080p': { width: 1440, height: 1080 }
          '3:4+480p': { width: 480, height: 640 }
          '3:4+720p': { width: 720, height: 960 }
          '3:4+1080p': { width: 1080, height: 1440 }
          '1:1+480p': { width: 512, height: 512 }
          '1:1+720p': { width: 720, height: 720 }
          '1:1+1080p': { width: 1080, height: 1080 }
          '16:9+': landscape_16_9
          '9:16+': portrait_16_9
          '4:3+': landscape_4_3
          '3:4+': portrait_4_3
          '1:1+': square_hd

    # LTX-2-19b Distilled Audio-to-Video
    ltx-2-19b/distilled/audio-to-video:
      Prompt: prompt
      CharacterImage: image_url
      AudioUrl: audio_url
      Duration:
        field: num_frames
        durationToFrames:
          fps: 25
      Resolution:
        field: video_size
        resolution:
          mode: aspectRatioAndPreset
        transform:
          '16:9+480p': { width: 848, height: 480 }
          '16:9+720p': { width: 1280, height: 720 }
          '16:9+1080p': { width: 1920, height: 1080 }
          '9:16+480p': { width: 480, height: 848 }
          '9:16+720p': { width: 720, height: 1280 }
          '9:16+1080p': { width: 1080, height: 1920 }
          '4:3+480p': { width: 640, height: 480 }
          '4:3+720p': { width: 960, height: 720 }
          '4:3+1080p': { width: 1440, height: 1080 }
          '3:4+480p': { width: 480, height: 640 }
          '3:4+720p': { width: 720, height: 960 }
          '3:4+1080p': { width: 1080, height: 1440 }
          '1:1+480p': { width: 512, height: 512 }
          '1:1+720p': { width: 720, height: 720 }
          '1:1+1080p': { width: 1080, height: 1080 }
          '16:9+': landscape_16_9
          '9:16+': portrait_16_9
          '4:3+': landscape_4_3
          '3:4+': portrait_4_3
          '1:1+': square_hd

  replicate:
    # Kwaivgi Kling Avatar v2
    kwaivgi/kling-avatar-v2:
      Prompt: prompt
      CharacterImage: image
      AudioUrl: audio

  wavespeed-ai:
    # WaveSpeed AI InfiniTalk
    wavespeed-ai/infinitetalk:
      Prompt: prompt
      CharacterImage: image
      AudioUrl: audio
      Resolution:
        field: resolution
        resolution:
          mode: preset
