meta:
  name: Reference-Image-to-Video Generator
  description: Generate video with subject consistency using reference images. Use this when you have reference photos of characters, products, or objects that must appear recognizable and consistent across generated video clips.
  id: ReferenceToVideoProducer
  kind: producer
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: Prompt
    description: Text description of the video.
    type: string
    storyboard: main

  # References
  - name: ReferenceImages
    description: Reference images for consistent subject appearance.
    type: array
    itemType: image

  # Duration
  - name: Duration
    description: Video duration in seconds.
    type: integer
    required: true

  # Sizing
  - name: Resolution
    description: Resolution as width/height pixel dimensions.
    type: resolution

  # Audio
  - name: GenerateAudio
    description: Whether to generate audio.
    type: boolean

artifacts:
  - name: GeneratedVideo
    description: The generated video.
    type: video
  - name: FirstFrame
    description: The first frame of the generated video.
    type: image
  - name: LastFrame
    description: The last frame of the generated video.
    type: image
  - name: AudioTrack
    description: The audio track of the generated video.
    type: audio

mappings:
  fal-ai:
    # Veo 3.1 Reference-to-Video (uses image references)
    veo3.1/reference-to-video:
      Prompt: prompt
      ReferenceImages: image_urls
      Duration:
        field: duration
        intToSecondsString: true
      Resolution:
        field: resolution
        resolution:
          mode: preset
      GenerateAudio: generate_audio

    # Kling Video O1 Reference-to-Video
    kling-video/o1/reference-to-video:
      Prompt: prompt
      ReferenceImages: image_urls
      Duration:
        field: duration
        intToString: true
      Resolution:
        field: aspect_ratio
        resolution:
          mode: aspectRatio

    # Kling Video O1 Standard Reference-to-Video
    kling-video/o1/standard/reference-to-video:
      Prompt: prompt
      ReferenceImages: image_urls
      Duration:
        field: duration
        intToString: true
      Resolution:
        field: aspect_ratio
        resolution:
          mode: aspectRatio

    # Kling Video O3 Standard Reference-to-Video
    kling-video/o3/standard/reference-to-video:
      Prompt: prompt
      ReferenceImages: image_urls
      Duration:
        field: duration
        intToString: true
      Resolution:
        field: aspect_ratio
        resolution:
          mode: aspectRatio
      GenerateAudio: generate_audio

    # Kling Video O3 Pro Reference-to-Video
    kling-video/o3/pro/reference-to-video:
      Prompt: prompt
      ReferenceImages: image_urls
      Duration:
        field: duration
        intToString: true
      Resolution:
        field: aspect_ratio
        resolution:
          mode: aspectRatio
      GenerateAudio: generate_audio

    # xAI Grok Imagine Reference-to-Video
    xai/grok-imagine-video/reference-to-video:
      Prompt: prompt
      ReferenceImages: reference_image_urls
      Duration: duration
      Resolution:
        expand: true
        resolution:
          mode: aspectRatioAndPresetObject
          aspectRatioField: aspect_ratio
          presetField: resolution

    # Wan 2.6 Reference-to-Video Flash
    wan/v2.6/reference-to-video/flash:
      Prompt: prompt
      ReferenceImages: image_urls
      Duration:
        field: duration
        intToString: true
      Resolution:
        expand: true
        resolution:
          mode: aspectRatioAndPresetObject
          aspectRatioField: aspect_ratio
          presetField: resolution
      GenerateAudio: enable_audio

    # Wan 2.7 Reference-to-Video
    wan/v2.7/reference-to-video:
      Prompt: prompt
      ReferenceImages: reference_image_urls
      Duration: duration
      Resolution:
        expand: true
        resolution:
          mode: aspectRatioAndPresetObject
          aspectRatioField: aspect_ratio
          presetField: resolution

    # ByteDance Seedance 2.0 Reference-to-Video
    bytedance/seedance-2.0/reference-to-video:
      Prompt: prompt
      ReferenceImages: image_urls
      Duration:
        field: duration
        intToString: true
      Resolution:
        expand: true
        resolution:
          mode: aspectRatioAndPresetObject
          aspectRatioField: aspect_ratio
          presetField: resolution
      GenerateAudio: generate_audio

    # ByteDance Seedance 2.0 Fast Reference-to-Video
    bytedance/seedance-2.0/fast/reference-to-video:
      Prompt: prompt
      ReferenceImages: image_urls
      Duration:
        field: duration
        intToString: true
      Resolution:
        expand: true
        resolution:
          mode: aspectRatioAndPresetObject
          aspectRatioField: aspect_ratio
          presetField: resolution
      GenerateAudio: generate_audio

  replicate:
    # ByteDance Seedance 1 Lite (has reference_images for character/environment consistency)
    bytedance/seedance-1-lite:
      Prompt: prompt
      ReferenceImages: reference_images
      Duration: duration
      Resolution:
        field: aspect_ratio
        resolution:
          mode: aspectRatio

    # Kling V3 Omni Video (reference_images for elements/scenes/styles)
    kwaivgi/kling-v3-omni-video:
      Prompt: prompt
      ReferenceImages: reference_images
      Duration: duration
      Resolution:
        field: aspect_ratio
        resolution:
          mode: aspectRatio
      GenerateAudio: generate_audio

    # Kling O1 (reference_images for elements/scenes/styles)
    kwaivgi/kling-o1:
      Prompt: prompt
      ReferenceImages: reference_images
      Duration: duration
      Resolution:
        field: aspect_ratio
        resolution:
          mode: aspectRatio

    # xAI Grok Imagine R2V
    xai/grok-imagine-r2v:
      Prompt: prompt
      ReferenceImages: reference_images
      Duration: duration
      Resolution:
        expand: true
        resolution:
          mode: object
          fields:
            aspect_ratio:
              mode: aspectRatio
            resolution:
              mode: preset
              transform:
                '480p': '480p'
                '720p': '720p'
                '1080p': '720p'
                '1440p': '720p'
                '2160p': '720p'

    # ByteDance Seedance 2.0 (reference_images)
    bytedance/seedance-2.0:
      Prompt: prompt
      ReferenceImages: reference_images
      Duration: duration
      Resolution:
        expand: true
        resolution:
          mode: object
          fields:
            aspect_ratio:
              mode: aspectRatio
            resolution:
              mode: preset
              transform:
                '480p': '480p'
                '720p': '720p'
                '1080p': '720p'
                '1440p': '720p'
                '2160p': '720p'
      GenerateAudio: generate_audio

    # ByteDance Seedance 2.0 Fast (reference_images)
    bytedance/seedance-2.0-fast:
      Prompt: prompt
      ReferenceImages: reference_images
      Duration: duration
      Resolution:
        expand: true
        resolution:
          mode: object
          fields:
            aspect_ratio:
              mode: aspectRatio
            resolution:
              mode: preset
              transform:
                '480p': '480p'
                '720p': '720p'
                '1080p': '720p'
                '1440p': '720p'
                '2160p': '720p'
      GenerateAudio: generate_audio

    # Wan Video WAN 2.7 Reference-to-Video
    wan-video/wan-2.7-r2v:
      Prompt: prompt
      ReferenceImages: reference_images
      Duration: duration
      Resolution:
        expand: true
        resolution:
          mode: aspectRatioAndPresetObject
          aspectRatioField: aspect_ratio
          presetField: resolution
