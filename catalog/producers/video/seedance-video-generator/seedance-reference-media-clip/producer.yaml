meta:
  name: Seedance Reference Media Clip
  description: Generate a Seedance 2.0 motion clip from a prompt plus reference images, videos, and/or audio.
  id: SeedanceReferenceMediaClipProducer
  kind: producer
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: Prompt
    description: Seedance-ready reference-to-video prompt.
    type: string
    storyboard: main
  - name: ReferenceImages
    description: Reference images for subject, style, composition, or visual continuity.
    type: array
    itemType: image
    required: false
    fanIn: true
  - name: ReferenceVideos
    description: Reference videos for motion, timing, or visual continuity.
    type: array
    itemType: video
    required: false
  - name: ReferenceAudios
    description: Reference audio files for sound, rhythm, or voice texture.
    type: array
    itemType: audio
    required: false
  - name: Duration
    description: Motion clip duration in seconds.
    type: integer
    required: true
  - name: Resolution
    description: Output resolution as width/height pixel dimensions.
    type: resolution
  - name: GenerateAudio
    description: Whether the clip should request native audio.
    type: boolean
    required: false

outputs:
  - name: GeneratedVideo
    description: Generated video.
    type: video
  - name: FirstFrame
    description: First frame of the generated video.
    type: image
  - name: LastFrame
    description: Last frame of the generated video.
    type: image
  - name: AudioTrack
    description: Extracted native audio track.
    type: audio

mappings:
  fal-ai:
    bytedance/seedance-2.0/reference-to-video:
      Prompt: prompt
      ReferenceImages:
        field: image_urls
        flattenFanIn: true
      ReferenceVideos: video_urls
      ReferenceAudios: audio_urls
      Duration:
        field: duration
        intToString: true
      Resolution:
        expand: true
        resolution:
          mode: aspectRatioAndPresetObject
          aspectRatioField: aspect_ratio
          presetField: resolution
      GenerateAudio:
        field: generate_audio
        transform:
          'true': true
          'false': false

    bytedance/seedance-2.0/fast/reference-to-video:
      Prompt: prompt
      ReferenceImages:
        field: image_urls
        flattenFanIn: true
      ReferenceVideos: video_urls
      ReferenceAudios: audio_urls
      Duration:
        field: duration
        intToString: true
      Resolution:
        expand: true
        resolution:
          mode: aspectRatioAndPresetObject
          aspectRatioField: aspect_ratio
          presetField: resolution
      GenerateAudio:
        field: generate_audio
        transform:
          'true': true
          'false': false
