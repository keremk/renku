meta:
  name: Seedance Multi Shot Prompt Producer
  description: Converts one semantic scene intent into a Seedance multi-shot prompt.
  id: SeedanceMultiShotPromptProducer
  kind: producer
  version: 0.1.0
  author: Renku
  license: MIT
  promptFile: ./prompts.toml
  outputSchema: ./output-schema.json

inputs:
  - name: Workflow
    description: Workflow selector passed through for graph traceability.
    type: string
  - name: SceneIntent
    description: Core visible scene, subject, and action.
    type: string
  - name: CameraIntent
    description: Camera movement and framing intent.
    type: string
  - name: AudioIntent
    description: Sound-design intent when native audio is requested.
    type: string
  - name: EnvironmentAndStyle
    description: Environment, lighting, and visual texture.
    type: string
  - name: ShotBreakdown
    description: Explicit shot-by-shot structure.
    type: string
  - name: UseNativeAudio
    description: Whether native clip audio is wanted.
    type: boolean

outputs:
  - name: Prompt
    description: Final Seedance multi-shot prompt for one clip.
    type: string
