meta:
  name: Seedance Reference Media Prompt Producer
  description: Converts one semantic scene intent into a Seedance reference-to-video prompt.
  id: SeedanceReferenceMediaPromptProducer
  kind: producer
  version: 0.1.0
  author: Renku
  license: MIT
  promptFile: ./prompts.toml
  outputSchema: ./output-schema.json

inputs:
  - name: Workflow
    description: Workflow selector passed through for graph traceability.
    type: string
  - name: SceneIntent
    description: Core visible scene, subject, and action.
    type: string
  - name: CameraIntent
    description: Camera movement and framing intent.
    type: string
  - name: AudioIntent
    description: Sound-design intent when native audio is requested.
    type: string
  - name: EnvironmentAndStyle
    description: Environment, lighting, and visual texture.
    type: string
  - name: ReferenceMediaInstructions
    description: Explicit explanation of what the supplied reference media contributes.
    type: string
  - name: UseNativeAudio
    description: Whether native clip audio is wanted.
    type: boolean

outputs:
  - name: Prompt
    description: Final Seedance reference-to-video prompt for one clip.
    type: string
