meta:
  name: Seedance Start End Clip
  description: Generate a Seedance 2.0 motion clip that transitions from a required start image to a required end image.
  id: SeedanceStartEndClipProducer
  kind: producer
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: Prompt
    description: Seedance-ready transition prompt.
    type: string
    storyboard: main
  - name: StartImage
    description: Starting frame image.
    type: image
  - name: EndImage
    description: Ending frame image.
    type: image
  - name: Duration
    description: Motion clip duration in seconds.
    type: integer
    required: true
  - name: Resolution
    description: Output resolution as width/height pixel dimensions.
    type: resolution
  - name: GenerateAudio
    description: Whether the clip should request native audio.
    type: boolean
    required: false

outputs:
  - name: GeneratedVideo
    description: Generated video.
    type: video
  - name: FirstFrame
    description: First frame of the generated video.
    type: image
  - name: LastFrame
    description: Last frame of the generated video.
    type: image
  - name: AudioTrack
    description: Extracted native audio track.
    type: audio

mappings:
  fal-ai:
    bytedance/seedance-2.0/image-to-video:
      Prompt: prompt
      StartImage: image_url
      EndImage: end_image_url
      Duration:
        field: duration
        intToString: true
      Resolution:
        expand: true
        resolution:
          mode: aspectRatioAndPresetObject
          aspectRatioField: aspect_ratio
          presetField: resolution
      GenerateAudio:
        field: generate_audio
        transform:
          'true': true
          'false': false

    bytedance/seedance-2.0/fast/image-to-video:
      Prompt: prompt
      StartImage: image_url
      EndImage: end_image_url
      Duration:
        field: duration
        intToString: true
      Resolution:
        expand: true
        resolution:
          mode: aspectRatioAndPresetObject
          aspectRatioField: aspect_ratio
          presetField: resolution
      GenerateAudio:
        field: generate_audio
        transform:
          'true': true
          'false': false
