meta:
  name: Video-to-Video Generator
  description: Transform or extend existing video using AI models.
  id: VideoToVideoProducer
  kind: producer
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: Prompt
    description: Text description guiding the transformation.
    type: string
  - name: SourceVideo
    description: URL of the source video to transform or extend.
    type: string
  - name: Duration
    description: Video duration in seconds.
    type: integer
    required: true
  - name: Resolution
    description: Resolution as width/height pixel dimensions.
    type: resolution
    required: false
  - name: GenerateAudio
    description: Whether to generate audio.
    type: boolean
    required: false

outputs:
  - name: GeneratedVideo
    description: The generated/transformed video.
    type: video
  - name: FirstFrame
    description: The first frame of the generated video.
    type: image
  - name: LastFrame
    description: The last frame of the generated video.
    type: image
  - name: AudioTrack
    description: The audio track of the generated video.
    type: audio

mappings:
  fal-ai:
    # XAI Grok Imagine Video Edit-Video
    xai/grok-imagine-video/edit-video:
      Prompt: prompt
      SourceVideo: video_url
      Resolution:
        field: resolution
        resolution:
          mode: preset

    # Decart Lucy Edit Pro
    decart/lucy-edit/pro:
      Prompt: prompt
      SourceVideo: video_url
      Resolution:
        field: resolution
        resolution:
          mode: preset

    # Decart Lucy Edit Fast
    decart/lucy-edit/fast:
      Prompt: prompt
      SourceVideo: video_url

    # Veo 3.1 Extend-Video
    veo3.1/extend-video:
      Prompt: prompt
      SourceVideo: video_url
      Duration:
        field: duration
        intToSecondsString: true
      Resolution:
        expand: true
        resolution:
          mode: aspectRatioAndPresetObject
          aspectRatioField: aspect_ratio
          presetField: resolution
      GenerateAudio: generate_audio

    # Veo 3.1 Fast Extend-Video
    veo3.1/fast/extend-video:
      Prompt: prompt
      SourceVideo: video_url
      Duration:
        field: duration
        intToSecondsString: true
      Resolution:
        expand: true
        resolution:
          mode: aspectRatioAndPresetObject
          aspectRatioField: aspect_ratio
          presetField: resolution
      GenerateAudio: generate_audio

    # LTX-2-19b Distilled Extend-Video
    ltx-2-19b/distilled/extend-video:
      Prompt: prompt
      SourceVideo: video_url
      Resolution: video_size
      Duration:
        field: num_frames
        durationToFrames:
          fps: 25
      GenerateAudio: generate_audio

    # LTX-2-19b Distilled Video-to-Video
    ltx-2-19b/distilled/video-to-video:
      Prompt: prompt
      SourceVideo: video_url
      Resolution: video_size
      Duration:
        field: num_frames
        durationToFrames:
          fps: 25
      GenerateAudio: generate_audio

  replicate:
    # XAI Grok Imagine Video (video editing mode)
    xai/grok-imagine-video:
      Prompt: prompt
      SourceVideo: video
      Duration: duration
      Resolution:
        expand: true
        resolution:
          mode: aspectRatioAndPresetObject
          aspectRatioField: aspect_ratio
          presetField: resolution
