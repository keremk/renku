meta:
  name: Kling Image Clip
  description: Generate a Kling motion clip from a prompt plus a required start image.
  id: KlingImageClipProducer
  kind: producer
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: Prompt
    description: Kling-ready image-to-video prompt.
    type: string
    storyboard: main
  - name: StartImage
    description: Starting frame image.
    type: image
  - name: EndImage
    description: Optional ending frame image.
    type: image
    required: false
  - name: ElementFrontalImages
    description: Grouped frontal images for Kling elements.
    type: array
    itemType: image
    fanIn: true
    required: false
  - name: ElementReferenceImages
    description: Grouped additional reference images for Kling elements.
    type: array
    itemType: image
    fanIn: true
    required: false
  - name: ElementVideos
    description: Optional grouped video references for Kling elements.
    type: array
    itemType: video
    fanIn: true
    required: false
  - name: ElementVoiceIds
    description: Optional Kling voice IDs for video elements. Group order binds to @Element1, @Element2, and so on.
    type: array
    itemType: string
    fanIn: true
    required: false
  - name: Duration
    description: Motion clip duration in seconds.
    type: integer
    required: true
  - name: Resolution
    description: Output resolution as width/height pixel dimensions.
    type: resolution
  - name: GenerateAudio
    description: Whether the clip should request native audio.
    type: boolean
    required: false
  - name: NegativePrompt
    description: Things Kling should avoid. Used by V3 endpoints.
    type: string
    required: false

outputs:
  - name: GeneratedVideo
    description: Generated video.
    type: video
  - name: FirstFrame
    description: First frame of the generated video.
    type: image
  - name: LastFrame
    description: Last frame of the generated video.
    type: image
  - name: AudioTrack
    description: Extracted native audio track.
    type: audio

mappings:
  fal-ai:
    kling-video/v3/standard/image-to-video:
      Prompt: prompt
      StartImage: start_image_url
      EndImage: end_image_url
      ElementFrontalImages:
        field: elements[].frontal_image_url
      ElementReferenceImages:
        field: elements[].reference_image_urls
      ElementVideos:
        field: elements[].video_url
      ElementVoiceIds:
        field: elements[].voice_id
      Duration:
        field: duration
        intToString: true
      GenerateAudio: generate_audio
      NegativePrompt: negative_prompt

    kling-video/v3/pro/image-to-video:
      Prompt: prompt
      StartImage: start_image_url
      EndImage: end_image_url
      ElementFrontalImages:
        field: elements[].frontal_image_url
      ElementReferenceImages:
        field: elements[].reference_image_urls
      ElementVideos:
        field: elements[].video_url
      ElementVoiceIds:
        field: elements[].voice_id
      Duration:
        field: duration
        intToString: true
      GenerateAudio: generate_audio
      NegativePrompt: negative_prompt

    kling-video/o3/standard/image-to-video:
      Prompt: prompt
      StartImage: image_url
      EndImage: end_image_url
      Duration:
        field: duration
        intToString: true
      GenerateAudio: generate_audio

    kling-video/o3/pro/image-to-video:
      Prompt: prompt
      StartImage: image_url
      EndImage: end_image_url
      Duration:
        field: duration
        intToString: true
      GenerateAudio: generate_audio
