meta:
  name: Kling Video Reference Prompt Producer
  description: Converts one semantic scene intent into a Kling video-reference prompt.
  id: KlingVideoReferencePromptProducer
  kind: producer
  version: 0.1.0
  author: Renku
  license: MIT
  promptFile: ./prompts.toml
  outputSchema: ./output-schema.json

inputs:
  - name: SceneIntent
    description: Core visible scene, subject, and action.
    type: string
  - name: CameraIntent
    description: Camera movement and framing intent.
    type: string
  - name: AudioIntent
    description: Source-audio or sound-design intent.
    type: string
  - name: EnvironmentAndStyle
    description: Environment, lighting, and visual texture.
    type: string
  - name: ReferenceInstructions
    description: Explicit explanation of what @Video1, @Image, and @Element references contribute.
    type: string

outputs:
  - name: Prompt
    description: Final Kling video-reference prompt for one clip.
    type: string
