meta:
  name: Video Extension Generator
  description: Extend an existing video by generating new frames at the beginning or end. Use this when you want to make a video longer while maintaining visual continuity.
  id: ExtendVideoProducer
  kind: producer
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: Prompt
    description: Text description guiding the extension content.
    type: string
  - name: SourceVideo
    description: URL of the video to extend.
    type: string

  # Duration
  - name: Duration
    description: Duration in seconds to extend the video.
    type: integer

  # Extension direction
  - name: Mode
    description: "Where to extend: 'end' (default) or 'start'."
    type: string

  # Sizing
  - name: Resolution
    description: 'Output resolution as explicit dimensions (width/height).'
    type: resolution

  # Audio
  - name: GenerateAudio
    description: Whether to generate audio.
    type: boolean

artifacts:
  - name: GeneratedVideo
    description: The extended video.
    type: video
  - name: FirstFrame
    description: The first frame of the extended video.
    type: image
  - name: LastFrame
    description: The last frame of the extended video.
    type: image
  - name: AudioTrack
    description: The audio track of the extended video.
    type: audio

mappings:
  fal-ai:
    # Veo 3.1 Extend-Video
    veo3.1/extend-video:
      Prompt: prompt
      SourceVideo: video_url
      Duration:
        field: duration
        intToSecondsString: true
      Resolution:
        expand: true
        resolution:
          mode: aspectRatioAndPresetObject
          aspectRatioField: aspect_ratio
          presetField: resolution
      GenerateAudio: generate_audio

    # Veo 3.1 Fast Extend-Video
    veo3.1/fast/extend-video:
      Prompt: prompt
      SourceVideo: video_url
      Duration:
        field: duration
        intToSecondsString: true
      Resolution:
        expand: true
        resolution:
          mode: aspectRatioAndPresetObject
          aspectRatioField: aspect_ratio
          presetField: resolution
      GenerateAudio: generate_audio

    # LTX-2.3 Extend-Video
    ltx-2.3/extend-video:
      Prompt: prompt
      SourceVideo: video_url
      Duration: duration
      Mode: mode

    # xAI Grok Imagine Extend-Video
    xai/grok-imagine-video/extend-video:
      Prompt: prompt
      SourceVideo: video_url
      Duration: duration

    # LTX-2-19b Distilled Extend-Video
    ltx-2-19b/distilled/extend-video:
      Prompt: prompt
      SourceVideo: video_url
      Resolution: video_size
      Duration:
        field: num_frames
        durationToFrames:
          fps: 25
      GenerateAudio: generate_audio
