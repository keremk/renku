meta:
  name: Text-to-Video Generator
  description: Generate video from text prompts using various AI models.
  id: TextToVideoProducer
  kind: producer
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: Prompt
    description: Text description of the video to generate.
    type: string
    storyboard: main

  # Duration
  - name: Duration
    description: Video duration in seconds.
    type: integer
  - name: NumFrames
    description: Number of frames (for frame-based models).
    type: integer

  # Sizing
  - name: Resolution
    description: Resolution as width/height pixel dimensions.
    type: resolution

  # Audio
  - name: GenerateAudio
    description: Whether to generate audio for the video.
    type: boolean
  - name: AudioUrl
    description: URL to background audio file.
    type: string

artifacts:
  - name: GeneratedVideo
    description: The generated video.
    type: video
  - name: FirstFrame
    description: The first frame of the generated video.
    type: image
  - name: LastFrame
    description: The last frame of the generated video.
    type: image
  - name: AudioTrack
    description: The audio track of the generated video.
    type: audio

mappings:
  fal-ai:
    # Wan v2.6 Text-to-Video
    wan/v2.6/text-to-video:
      Prompt: prompt
      Duration:
        field: duration
        intToString: true
      Resolution:
        expand: true
        resolution:
          mode: aspectRatioAndPresetObject
          aspectRatioField: aspect_ratio
          presetField: resolution
      AudioUrl: audio_url

    # Veo 3.1 Text-to-Video
    veo3.1:
      Prompt: prompt
      Duration:
        field: duration
        intToSecondsString: true
      Resolution:
        expand: true
        resolution:
          mode: aspectRatioAndPresetObject
          aspectRatioField: aspect_ratio
          presetField: resolution
      GenerateAudio: generate_audio

