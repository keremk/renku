meta:
  name: Image Camera Editor
  description: Adjust the camera viewpoint of an object in an existing image. Takes a source image and applies precise 3D camera angle controls (azimuth, elevation, zoom) to render a new view of the same subject. Use this when you want to see an object or scene from a different angle rather than editing its content.
  id: ImageEditCameraProducer
  kind: producer
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: SourceImage
    description: The image to adjust the camera angle for.
    type: image

  # Optional additional prompt
  - name: Prompt
    description: Optional additional text to guide the generation (appended to the auto-generated camera prompt).
    type: string

  # Camera controls
  - name: CameraAzimuth
    description: 'Horizontal rotation angle around the object in degrees. 0°=front view, 90°=right side, 180°=back view, 270°=left side.'
    type: number
  - name: CameraElevation
    description: "Vertical camera angle in degrees. -30°=low-angle shot (looking up), 0°=eye-level, 30°=elevated, 90°=bird's-eye view (looking down)."
    type: number
  - name: CameraZoom
    description: 'Camera zoom/distance. 0=wide shot (far away), 5=medium shot (normal), 10=close-up (very close).'
    type: number

  # Sizing
  - name: Resolution
    description: Output resolution as width/height pixel dimensions.
    type: resolution

artifacts:
  - name: TransformedImage
    description: The image rendered from the new camera viewpoint.
    type: image

mappings:
  fal-ai:
    qwen-image-edit-2511-multiple-angles:
      SourceImage:
        field: image_urls
        asArray: true
      Prompt: additional_prompt
      CameraAzimuth: horizontal_angle
      CameraElevation: vertical_angle
      CameraZoom: zoom
      Resolution:
        field: image_size
        resolution:
          mode: aspectRatio
        transform:
          '16:9': landscape_16_9
          '9:16': portrait_16_9
          '4:3': landscape_4_3
          '3:4': portrait_4_3
          '1:1': square_hd
