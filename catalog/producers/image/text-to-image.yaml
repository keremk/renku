meta:
  name: Text-to-Image Generator
  description: Generate images from text prompts using various AI models.
  id: TextToImageProducer
  kind: producer
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: Prompt
    description: Text description of the image to generate.
    type: string
    storyboard: main

  # Sizing
  - name: Resolution
    description: Resolution as width/height pixel dimensions.
    type: resolution

artifacts:
  - name: GeneratedImage
    description: The generated image(s).
    type: image

mappings:
  fal-ai:
    # Pattern 4: image_size presets
    bytedance/seedream/v4.5/text-to-image:
      Prompt: prompt
      Resolution: image_size

    bytedance/seedream/v5/lite/text-to-image:
      Prompt: prompt
      Resolution: image_size

    bytedance/seedream/v4/text-to-image:
      Prompt: prompt
      Resolution:
        field: image_size
        resolution:
          mode: aspectRatio
        transform:
          '16:9': landscape_16_9
          '9:16': portrait_16_9
          '4:3': landscape_4_3
          '3:4': portrait_4_3
          '1:1': square_hd
          '3:2': landscape_4_3
          '2:3': portrait_4_3

    # Pattern 1: aspect_ratio only
    flux-pro/kontext/text-to-image:
      Prompt: prompt
      Resolution:
        field: aspect_ratio
        resolution:
          mode: aspectRatio
      # Resolution ignored - model doesn't support it

    # Pattern 5: Fixed dimension strings
    gpt-image-1.5:
      Prompt: prompt
      Resolution:
        field: image_size
        resolution:
          mode: aspectRatio
        transform:
          '1:1': '1024x1024'
          '16:9': '1536x1024'
          '9:16': '1024x1536'
          # Other ratios not supported - error or default
      # Resolution ignored - only fixed sizes

    # Pattern 2: aspect_ratio + resolution
    nano-banana-pro:
      Prompt: prompt
      Resolution:
        expand: true
        resolution:
          mode: aspectRatioAndSizeTokenObject
          aspectRatioField: aspect_ratio
          sizeTokenField: resolution

    nano-banana-2:
      Prompt: prompt
      Resolution:
        expand: true
        resolution:
          mode: aspectRatioAndSizeTokenObject
          aspectRatioField: aspect_ratio
          sizeTokenField: resolution

    # Pattern 4: image_size presets
    qwen-image-2512:
      Prompt: prompt
      Resolution: image_size

    qwen-image-2/pro/text-to-image:
      Prompt: prompt
      Resolution:
        field: image_size
        resolution:
          mode: aspectRatio
        transform:
          '16:9': landscape_16_9
          '9:16': portrait_16_9
          '4:3': landscape_4_3
          '3:4': portrait_4_3
          '1:1': square_hd

    qwen-image-2/text-to-image:
      Prompt: prompt
      Resolution:
        field: image_size
        resolution:
          mode: aspectRatio
        transform:
          '16:9': landscape_16_9
          '9:16': portrait_16_9
          '4:3': landscape_4_3
          '3:4': portrait_4_3
          '1:1': square_hd

    wan/v2.6/text-to-image:
      Prompt: prompt
      Resolution:
        field: image_size
        resolution:
          mode: aspectRatio
        transform:
          '16:9': landscape_16_9
          '9:16': portrait_16_9
          '4:3': landscape_4_3
          '3:4': portrait_4_3
          '1:1': square_hd

    wan/v2.7/text-to-image:
      Prompt: prompt
      Resolution:
        field: image_size
        resolution:
          mode: aspectRatio
        transform:
          '16:9': landscape_16_9
          '9:16': portrait_16_9
          '4:3': landscape_4_3
          '3:4': portrait_4_3
          '1:1': square_hd

    wan/v2.7/pro/text-to-image:
      Prompt: prompt
      Resolution:
        field: image_size
        resolution:
          mode: aspectRatio
        transform:
          '16:9': landscape_16_9
          '9:16': portrait_16_9
          '4:3': landscape_4_3
          '3:4': portrait_4_3
          '1:1': square_hd

    hunyuan-image/v3/instruct/text-to-image:
      Prompt: prompt
      Resolution:
        field: image_size
        resolution:
          mode: aspectRatio
        transform:
          '16:9': landscape_16_9
          '9:16': portrait_16_9
          '4:3': landscape_4_3
          '3:4': portrait_4_3
          '1:1': square_hd

    xai/grok-imagine-image:
      Prompt: prompt
      Resolution:
        field: aspect_ratio
        resolution:
          mode: aspectRatio

    # Flux 2 family — image_size presets
    flux-2:
      Prompt: prompt
      Resolution:
        field: image_size
        resolution:
          mode: aspectRatio
        transform:
          '16:9': landscape_16_9
          '9:16': portrait_16_9
          '4:3': landscape_4_3
          '3:4': portrait_4_3
          '1:1': square_hd

    flux-2/flash:
      Prompt: prompt
      Resolution:
        field: image_size
        resolution:
          mode: aspectRatio
        transform:
          '16:9': landscape_16_9
          '9:16': portrait_16_9
          '4:3': landscape_4_3
          '3:4': portrait_4_3
          '1:1': square_hd

    flux-2/turbo:
      Prompt: prompt
      Resolution:
        field: image_size
        resolution:
          mode: aspectRatio
        transform:
          '16:9': landscape_16_9
          '9:16': portrait_16_9
          '4:3': landscape_4_3
          '3:4': portrait_4_3
          '1:1': square_hd

    # Recraft v4 — image_size presets
    recraft/v4/text-to-image:
      Prompt: prompt
      Resolution:
        field: image_size
        resolution:
          mode: aspectRatio
        transform:
          '16:9': landscape_16_9
          '9:16': portrait_16_9
          '4:3': landscape_4_3
          '3:4': portrait_4_3
          '1:1': square_hd

    recraft/v4/pro/text-to-image:
      Prompt: prompt
      Resolution:
        field: image_size
        resolution:
          mode: aspectRatio
        transform:
          '16:9': landscape_16_9
          '9:16': portrait_16_9
          '4:3': landscape_4_3
          '3:4': portrait_4_3
          '1:1': square_hd

    # Z-Image Turbo — image_size presets
    z-image/turbo:
      Prompt: prompt
      Resolution:
        field: image_size
        resolution:
          mode: aspectRatio
        transform:
          '16:9': landscape_16_9
          '9:16': portrait_16_9
          '4:3': landscape_4_3
          '3:4': portrait_4_3
          '1:1': square_hd

  replicate:
    # Bytedance Seedream 4
    bytedance/seedream-4:
      Prompt: prompt
      Resolution:
        expand: true
        resolution:
          mode: object
          fields:
            aspect_ratio:
              mode: aspectRatio
            size:
              mode: sizeTokenNearest
              transform:
                '1K': '1K'
                '2K': '2K'
                '3K': '4K'
                '4K': '4K'

    # Bytedance Seedream 4.5
    bytedance/seedream-4.5:
      Prompt: prompt
      Resolution:
        expand: true
        resolution:
          mode: object
          fields:
            aspect_ratio:
              mode: aspectRatio
            size:
              mode: sizeTokenNearest
              transform:
                '1K': '2K'
                '2K': '2K'
                '3K': '4K'
                '4K': '4K'

    # Bytedance Seedream 5 Lite
    bytedance/seedream-5-lite:
      Prompt: prompt
      Resolution:
        expand: true
        resolution:
          mode: object
          fields:
            aspect_ratio:
              mode: aspectRatio
            size:
              mode: sizeTokenNearest
              transform:
                '1K': '2K'
                '2K': '2K'
                '3K': '3K'
                '4K': '3K'

    # Google Nano Banana
    google/nano-banana:
      Prompt: prompt
      Resolution:
        field: aspect_ratio
        resolution:
          mode: aspectRatio

    # Google Nano Banana 2
    google/nano-banana-2:
      Prompt: prompt
      Resolution:
        expand: true
        resolution:
          mode: aspectRatioAndSizeTokenObject
          aspectRatioField: aspect_ratio
          sizeTokenField: resolution

    # Pattern 1: aspect_ratio only
    google/imagen-4:
      Prompt: prompt
      Resolution:
        field: aspect_ratio
        resolution:
          mode: aspectRatio
      # Only supports: 1:1, 9:16, 16:9, 3:4, 4:3
      # Resolution ignored

    # Pattern 7: Width/Height only
    prunaai/z-image-turbo:
      Prompt: prompt

    # Flux 2 Pro — aspect_ratio + resolution (megapixels)
    black-forest-labs/flux-2-pro:
      Prompt: prompt
      Resolution:
        expand: true
        resolution:
          mode: object
          fields:
            aspect_ratio:
              mode: aspectRatio
            resolution:
              mode: megapixelsNearest
              megapixelCandidates: [0.5, 1, 2, 4]
              megapixelSuffix: ' MP'
            width:
              mode: width
            height:
              mode: height

    # Flux 2 Max — same as Pro
    black-forest-labs/flux-2-max:
      Prompt: prompt
      Resolution:
        expand: true
        resolution:
          mode: object
          fields:
            aspect_ratio:
              mode: aspectRatio
            resolution:
              mode: megapixelsNearest
              megapixelCandidates: [0.5, 1, 2, 4]
              megapixelSuffix: ' MP'
            width:
              mode: width
            height:
              mode: height

    # Flux 2 Klein 9B — aspect_ratio + megapixels
    black-forest-labs/flux-2-klein-9b:
      Prompt: prompt
      Resolution:
        expand: true
        resolution:
          mode: object
          fields:
            aspect_ratio:
              mode: aspectRatio
            megapixels:
              mode: megapixelsNearest
              megapixelCandidates: [0.25, 0.5, 1, 2, 4]

    # Recraft v4 — aspect_ratio + size
    recraft-ai/recraft-v4:
      Prompt: prompt
      Resolution:
        field: aspect_ratio
        resolution:
          mode: aspectRatio

    # XAI Grok Imagine Image — aspect_ratio only
    xai/grok-imagine-image:
      Prompt: prompt
      Resolution:
        field: aspect_ratio
        resolution:
          mode: aspectRatio

    # PrunaAI P-Image — aspect_ratio + width/height
    prunaai/p-image:
      Prompt: prompt
      Resolution:
        field: aspect_ratio
        resolution:
          mode: aspectRatio

  wavespeed-ai:
    # Bytedance SeedDream v4.5 — size as WxH string
    bytedance/seedream-v4.5:
      Prompt: prompt
      Resolution:
        field: size
        resolution:
          mode: sizeTokenNearest
        transform:
          '1K': '1024*1024'
          '2K': '2048*2048'
          '3K': '3072*3072'
          '4K': '4096*4096'
