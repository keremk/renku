meta:
  name: Image Editor
  description: Edit or transform a single existing image. Takes one source image and applies prompt-guided modifications like style changes, object removal, relighting, or inpainting. Use this when you have one specific image you want to modify.
  id: ImageEditProducer
  kind: producer
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: Prompt
    description: Text instruction for the edit or transformation.
    type: string
    storyboard: main
  - name: SourceImage
    description: The single image to edit or transform.
    type: image

  # Optional mask for selective editing
  - name: MaskImage
    description: Mask image for selective region editing (white=edit, black=keep).
    type: image

  # Sizing
  - name: Resolution
    description: Output resolution as width/height pixel dimensions.
    type: resolution

outputs:
  - name: TransformedImage
    description: The edited/transformed image.
    type: image

mappings:
  fal-ai:
    # --- Single-image-only models (ONLY in image-edit, NOT in image-compose) ---

    flux-pro/kontext:
      Prompt: prompt
      SourceImage: image_url
      Resolution:
        field: aspect_ratio
        resolution:
          mode: aspectRatio

    z-image/turbo/image-to-image:
      Prompt: prompt
      SourceImage: image_url
      Resolution:
        field: image_size
        resolution:
          mode: aspectRatio
        transform:
          '16:9': landscape_16_9
          '9:16': portrait_16_9
          '4:3': landscape_4_3
          '3:4': portrait_4_3
          '1:1': square_hd

    bria/fibo-edit/edit:
      Prompt:
        field: instruction
      SourceImage: image_url
      MaskImage: mask_url

    # --- Array-accepting models mapped with asArray (also in image-compose) ---

    xai/grok-imagine-image/edit:
      Prompt: prompt
      SourceImage:
        field: image_urls
        asArray: true

