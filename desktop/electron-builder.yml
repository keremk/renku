appId: com.gorenku.renku
productName: Renku
copyright: Copyright (c) 2026 Coding Ventures

directories:
  output: release

mac:
  category: public.app-category.video
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  icon: build/icon.png
  # Production signing settings are applied by package:prod script.
  # Keep these off for local unsigned/ad-hoc builds.
  # hardenedRuntime: true
  # entitlements: build/entitlements.mac.plist
  # entitlementsInherit: build/entitlements.mac.plist

dmg:
  title: Renku
  window:
    width: 660
    height: 440
  iconSize: 100
  contents:
    - x: 190
      y: 255
    - x: 470
      y: 255
      type: link
      path: /Applications

afterSign: build/afterSign.cjs

npmRebuild: false

files:
  - dist/**/*
  - node_modules/**/*
  - '!dist/**/*.map'

extraResources:
  - from: resources/viewer-dist
    to: viewer-dist
  - from: resources/viewer-server
    to: viewer-server
  - from: resources/catalog
    to: catalog
  - from: resources/cli
    to: cli
  - from: resources/ffmpeg
    to: ffmpeg
  - from: resources/ffprobe
    to: ffprobe
  - from: scripts/renku-wrapper.sh
    to: renku-wrapper.sh
