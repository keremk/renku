appId: com.gorenku.renku
productName: Renku
copyright: Copyright (c) 2024 Kerem Karatal

directories:
  output: release

mac:
  category: public.app-category.video
  target:
    - dmg
    - zip
  icon: build/icon.png
  # Uncomment below when Apple Developer code signing is set up:
  # hardenedRuntime: true
  # entitlements: build/entitlements.mac.plist
  # entitlementsInherit: build/entitlements.mac.plist

dmg:
  title: Renku
  window:
    width: 660
    height: 440
  iconSize: 100
  contents:
    - x: 190
      y: 255
    - x: 470
      y: 255
      type: link
      path: /Applications

afterSign: build/afterSign.cjs

npmRebuild: false

files:
  - dist/**/*
  - "!dist/**/*.map"
  - "!node_modules"

extraResources:
  - from: resources/viewer-dist
    to: viewer-dist
  - from: resources/viewer-server
    to: viewer-server
  - from: resources/catalog
    to: catalog
  - from: resources/cli
    to: cli
  - from: resources/ffmpeg
    to: ffmpeg
  - from: resources/ffprobe
    to: ffprobe
  - from: scripts/renku-wrapper.sh
    to: renku-wrapper.sh
