meta:
  id: DirectCompositeVideo
  name: Direct Composite Video
  kind: blueprint

inputs:
  - name: Duration
    type: number
    required: true
  - name: Prompt
    type: string
    required: true
  - name: SourceImage
    type: image
    required: true

outputs:
  - name: FinalVideo
    type: video

imports:
  - name: PrepImage
    path: ./direct-prep-image.yaml
  - name: MainVideo
    path: ./direct-main-video.yaml

connections:
  - from: SourceImage
    to: PrepImage.SourceImage
  - from: Prompt
    to: MainVideo.Prompt
  - from: Duration
    to: MainVideo.Duration
  - from: PrepImage.EditedImage
    to: MainVideo.StartImage
  - from: MainVideo.GeneratedVideo
    to: FinalVideo
