meta:
  id: ViewerParseCelebrityThenNow
  name: Viewer Parse Celebrity Then Now

inputs:
  - name: CelebrityThenImages
    type: array
    itemType: image
    required: true
  - name: CelebrityNowImages
    type: array
    itemType: image
    required: true
  - name: SettingImage
    type: image
    required: true
  - name: NumOfClips
    type: int
    required: true

outputs:
  - name: ConsistentThenImages
    type: array
    itemType: image
    countInput: NumOfClips
  - name: ConsistentNowImages
    type: array
    itemType: image
    countInput: NumOfClips

loops:
  - name: segment
    countInput: NumOfClips

imports:
  - name: ThenImageProducer
    producer: image/image-compose
    loop: segment
  - name: NowImageProducer
    producer: image/image-compose
    loop: segment

connections:
  - from: CelebrityThenImages[segment]
    to: ThenImageProducer[segment].SourceImages[0]
  - from: SettingImage
    to: ThenImageProducer[segment].SourceImages[1]
  - from: ThenImageProducer[segment].ComposedImage
    to: ConsistentThenImages[segment]

  - from: CelebrityNowImages[segment]
    to: NowImageProducer[segment].SourceImages[0]
  - from: SettingImage
    to: NowImageProducer[segment].SourceImages[1]
  - from: NowImageProducer[segment].ComposedImage
    to: ConsistentNowImages[segment]
