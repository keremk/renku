meta:
  name: Conditional Test Blueprint
  description: Test blueprint for conditional edge evaluation.
  id: ConditionalTest
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: Duration
    description: Total documentary duration in seconds.
    type: int
    required: true
  - name: NumOfClips
    description: Number of documentary clips.
    type: int
    required: true
  - name: InquiryPrompt
    description: The topic describing the desired documentary.
    type: string
    required: true
  - name: NumOfImagesPerClip
    description: Number of images per clip.
    type: int
    required: true
  - name: Resolution
    description: Video resolution such as 480p, 720p, or 1080p. Model default varies.
    type: string
  - name: Size
    description: Image resolution (1K, 2K, 4K, or custom). Model default varies.
    type: string
  - name: AspectRatio
    description: Aspect ratio such as 16:9 or 3:2. Model default varies.
    type: string
  - name: Style
    description: Image style.
    type: string
    required: true
  - name: VoiceId
    description: Voice identifier.
    type: string
    required: true

outputs:
  - name: ClipImage
    description: Generated images (conditional).
    type: multiDimArray
    itemType: image
  - name: ClipAudio
    description: Generated audio (conditional).
    type: array
    itemType: audio
  - name: ClipVideo
    description: Generated video (conditional).
    type: array
    itemType: video
  - name: Timeline
    description: Generated timeline JSON.
    type: json

loops:
  - name: clip
    countInput: NumOfClips
  - name: image
    parent: clip
    countInput: NumOfImagesPerClip

# Named condition definitions (referenced by 'if:' on edges)
conditions:
  isImageNarration:
    when: DocProducer.VideoScript.Clips[clip].NarrationType
    is: 'ImageNarration'
  isAudioNeeded:
    any:
      - when: DocProducer.VideoScript.Clips[clip].NarrationType
        is: 'TalkingHead'
      - when: DocProducer.VideoScript.Clips[clip].UseNarrationAudio
        is: true
  isTalkingHead:
    when: DocProducer.VideoScript.Clips[clip].NarrationType
    is: 'TalkingHead'

imports:
  - name: DocProducer
    path: ../_shared/documentary/documentary.yaml
  - name: ImageProducer
    producer: image/text-to-image
    loop: clip.image
  - name: AudioProducer
    producer: audio/text-to-speech
    loop: clip
  - name: VideoProducer
    producer: video/text-to-video
    loop: clip
  - name: TimelineComposer
    producer: composition/timeline-composer

connections:
  # Wire inputs to DocProducer
  - from: InquiryPrompt
    to: DocProducer.InquiryPrompt
  - from: NumOfClips
    to: DocProducer.NumOfClips
  - from: NumOfImagesPerClip
    to: DocProducer.NumOfImagesPerClip
  - from: Style
    to: DocProducer.Style

  # Conditional: ImageProducer only when NarrationType is ImageNarration
  - from: DocProducer.VideoScript.Clips[clip].ImagePrompts[image]
    to: ImageProducer[clip][image].Prompt
    if: isImageNarration
  - from: AspectRatio
    to: ImageProducer[clip][image].AspectRatio
    if: isImageNarration
  - from: Size
    to: ImageProducer[clip][image].Resolution
    if: isImageNarration
  - from: ImageProducer[clip][image].GeneratedImage
    to: ClipImage[clip][image]
    if: isImageNarration

  # Conditional: AudioProducer only when NarrationType is TalkingHead
  - from: DocProducer.VideoScript.Clips[clip].Script
    to: AudioProducer[clip].Text
    if: isAudioNeeded
  - from: VoiceId
    to: AudioProducer[clip].VoiceId
    if: isAudioNeeded
  - from: AudioProducer[clip].GeneratedAudio
    to: ClipAudio[clip]
    if: isAudioNeeded

  # Conditional: VideoProducer only when NarrationType is TalkingHead
  - from: DocProducer.VideoScript.Clips[clip].VideoPrompt
    to: VideoProducer[clip].Prompt
    if: isTalkingHead
  - from: ClipDuration
    to: VideoProducer[clip].Duration
    if: isTalkingHead
  - from: Resolution
    to: VideoProducer[clip].Resolution
    if: isTalkingHead
  - from: AspectRatio
    to: VideoProducer[clip].AspectRatio
    if: isTalkingHead
  - from: VideoProducer[clip].GeneratedVideo
    to: ClipVideo[clip]
    if: isTalkingHead

  - from: AudioProducer[clip].GeneratedAudio
    to: TimelineComposer.AudioClips
    if: isAudioNeeded
  - from: VideoProducer[clip].GeneratedVideo
    to: TimelineComposer.VideoClips
    if: isTalkingHead
  - from: ImageProducer[clip][image].GeneratedImage
    to: TimelineComposer.ImageClips
    if: isImageNarration
  - from: Duration
    to: TimelineComposer.Duration
  - from: TimelineComposer.Timeline
    to: Timeline
