meta:
  id: CatalogCompositeImportQualifiedModule
  name: Catalog Composite Import Qualified Module

inputs:
  - name: Duration
    type: number
    required: true
  - name: Prompt
    type: string
    required: true
  - name: SourceImage
    type: image
    required: true

artifacts:
  - name: FinalVideo
    type: video

producers:
  - name: VoiceConditionedVideo
    producer: video/direct-composite

connections:
  - from: Duration
    to: VoiceConditionedVideo.Duration
  - from: Prompt
    to: VoiceConditionedVideo.Prompt
  - from: SourceImage
    to: VoiceConditionedVideo.SourceImage
  - from: VoiceConditionedVideo.FinalVideo
    to: FinalVideo
