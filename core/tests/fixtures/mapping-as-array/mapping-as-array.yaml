meta:
  name: Mapping As Array Fixture
  description: Fixture producer used to validate asArray mapping parsing.
  id: MappingAsArrayFixtureProducer
  kind: producer
  version: 0.1.0
  author: Renku
  license: MIT

inputs:
  - name: SourceImage
    description: Source image input.
    type: image

outputs:
  - name: OutputImage
    description: Output image artifact.
    type: image

mappings:
  fal-ai:
    bytedance/seedream/v4/text-to-image:
      SourceImage:
        field: image_urls
        asArray: true
