meta:
  name: Offset Selector Test
  description: Minimal fixture to test dimension selectors with offsets.
  id: OffsetSelectorTest
  version: 0.1.0

inputs:
  - name: NumOfClips
    description: Number of clips.
    type: int
    required: true
  - name: Prompt
    description: Input prompt.
    type: string
    required: true

outputs:
  - name: OutputVideo
    description: Generated video per clip.
    type: array
    itemType: video
    countInput: NumOfClips

loops:
  - name: clip
    description: Iterates over clips.
    countInput: NumOfClips
  - name: image
    description: Iterates over images (NumOfClips + 1).
    countInput: NumOfClips
    countInputOffset: 1

imports:
  - name: ImageProducer
    producer: image/text-to-image
    loop: image
  - name: VideoProducer
    producer: video/image-to-video
    loop: clip

connections:
  - from: Prompt
    to: ImageProducer[image].Prompt

  - from: ImageProducer[image].GeneratedImage
    to: VideoProducer[clip].StartImage

  - from: ImageProducer[image+1].GeneratedImage
    to: VideoProducer[clip].EndImage

  - from: VideoProducer[clip].GeneratedVideo
    to: OutputVideo[clip]
